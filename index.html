<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mob Hunt</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    .screen.active { display: flex; }

    /* ===== HOME SCREEN ===== */
    #home-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    #home-screen h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
      color: #e94560;
      margin-bottom: 0.5rem;
      letter-spacing: 0.2em;
    }
    #home-screen .subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .score-display {
      font-size: 1.4rem;
      color: #ffd700;
      margin-bottom: 1.5rem;
    }
    .score-display span { font-weight: bold; }
    .btn {
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      font-family: inherit;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      margin: 0.4rem;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }
    .btn:hover, .btn:active {
      background: #e94560;
      color: #fff;
    }
    .btn-small {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
    }

    /* ===== MOB SELECT ===== */
    #select-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      overflow-y: auto;
      justify-content: flex-start;
      padding: 1.5rem;
    }
    #select-screen h2 {
      font-size: 1.8rem;
      color: #e94560;
      margin-bottom: 1rem;
    }
    .mob-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }
    .mob-card {
      background: #16213e;
      border: 2px solid #333;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mob-card:hover, .mob-card:active {
      border-color: #e94560;
      transform: scale(1.05);
    }
    .mob-card .mob-preview {
      width: 64px; height: 64px;
      margin: 0 auto 0.5rem;
      image-rendering: pixelated;
    }
    .mob-card .mob-name {
      font-size: 0.9rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .mob-card .mob-info {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }

    /* ===== QR SCREEN ===== */
    #qr-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      padding: 1.5rem;
    }
    #qr-screen h2 {
      font-size: 1.4rem;
      color: #e94560;
      margin-bottom: 1rem;
    }
    #qr-canvas {
      background: #fff;
      padding: 16px;
      margin-bottom: 1rem;
    }
    .qr-info {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      background: linear-gradient(180deg, #2d1b3d 0%, #1a1a2e 40%, #0d2137 100%);
      cursor: crosshair;
    }
    .game-hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .hud-score {
      font-size: 1.2rem;
      color: #ffd700;
    }
    .hud-mob-name {
      font-size: 1rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* Health bar */
    .health-container {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .hearts-row {
      display: flex;
      gap: 2px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 300px;
    }
    .heart {
      width: 20px; height: 20px;
      position: relative;
      transition: transform 0.15s;
    }
    .heart.damaged {
      animation: heartPop 0.3s ease;
    }
    .heart svg { width: 100%; height: 100%; }
    .heart-full { fill: #e94560; }
    .heart-half { fill: #e94560; }
    .heart-empty { fill: #333; }

    @keyframes heartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* Mob display area */
    .mob-area {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mob-sprite {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      animation: mobIdle 0.8s ease-in-out infinite;
      transition: filter 0.1s;
    }
    .mob-sprite.hit {
      animation: mobHit 0.2s ease;
      filter: brightness(3);
    }
    .mob-sprite.dying {
      animation: mobDeath 0.8s ease forwards;
    }

    @keyframes mobIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes mobHit {
      0% { transform: translateX(0) scale(1); }
      25% { transform: translateX(-10px) scale(1.05); }
      50% { transform: translateX(10px) scale(1.05); }
      75% { transform: translateX(-5px) scale(1.02); }
      100% { transform: translateX(0) scale(1); }
    }
    @keyframes mobDeath {
      0% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
      30% { transform: scale(1.2) rotate(5deg); opacity: 1; filter: brightness(2); }
      100% { transform: scale(0) rotate(180deg); opacity: 0; filter: brightness(5); }
    }

    /* Damage numbers */
    .damage-number {
      position: absolute;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ff4444;
      pointer-events: none;
      animation: damageFloat 0.8s ease-out forwards;
      z-index: 20;
      text-shadow: 0 0 4px #000, 2px 2px 0 #000;
    }
    @keyframes damageFloat {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-80px) scale(0.5); opacity: 0; }
    }

    /* Click particles */
    .particle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 0.5s ease-out forwards;
      z-index: 20;
    }
    @keyframes particleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ===== VICTORY SCREEN ===== */
    #victory-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #0d3b1e 50%, #1a1a2e 100%);
    }
    #victory-screen h2 {
      font-size: 2.2rem;
      color: #4caf50;
      text-shadow: 0 0 20px #4caf50;
      margin-bottom: 1rem;
      animation: victoryPulse 1s ease-in-out infinite;
    }
    @keyframes victoryPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .victory-points {
      font-size: 3rem;
      color: #ffd700;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .victory-label {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .victory-mob {
      width: 96px; height: 96px;
      image-rendering: pixelated;
      margin-bottom: 1.5rem;
      opacity: 0.3;
      filter: grayscale(1);
    }

    /* ===== LOCKED MOB CARD ===== */
    .mob-card.locked {
      opacity: 0.6;
      border-color: #555;
      position: relative;
      cursor: default;
    }
    .mob-card.locked:hover, .mob-card.locked:active {
      border-color: #777;
      transform: none;
    }
    .mob-card .lock-icon {
      font-size: 1.5rem;
      color: #888;
      margin-bottom: 0.25rem;
    }
    .mob-card .lock-info {
      font-size: 0.7rem;
      color: #e94560;
      margin-top: 0.25rem;
    }
    .mob-card .fight-now-btn {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.25rem 0.6rem;
      font-size: 0.7rem;
      font-family: inherit;
      border: 1px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .mob-card .fight-now-btn:hover, .mob-card .fight-now-btn:active {
      background: #e94560;
      color: #fff;
    }
    /* Dragon-locked (points threshold) stays fully locked */
    .mob-card.dragon-locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .mob-card.dragon-locked:hover, .mob-card.dragon-locked:active {
      border-color: #555;
      transform: none;
    }

    /* ===== DRAGON UNLOCKED NOTIFICATION ===== */
    .dragon-notification {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: dragonFadeIn 0.5s ease;
    }
    .dragon-notification h2 {
      font-size: 2rem;
      color: #e040fb;
      text-shadow: 0 0 30px #e040fb, 0 0 60px #7b1fa2;
      margin-bottom: 1rem;
      animation: dragonPulse 1.5s ease-in-out infinite;
      text-align: center;
      padding: 0 1rem;
    }
    .dragon-notification canvas {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      margin-bottom: 1.5rem;
    }
    .dragon-notification .btn {
      border-color: #e040fb;
      color: #e040fb;
    }
    .dragon-notification .btn:hover, .dragon-notification .btn:active {
      background: #e040fb;
      color: #fff;
    }
    @keyframes dragonFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes dragonPulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 30px #e040fb, 0 0 60px #7b1fa2; }
      50% { transform: scale(1.05); text-shadow: 0 0 50px #e040fb, 0 0 80px #7b1fa2; }
    }

    /* ===== PRINT CARDS PAGE ===== */
    #print-screen {
      background: #fff;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 1rem;
    }
    #print-screen h2 {
      font-size: 1.6rem;
      color: #e94560;
      margin-bottom: 1rem;
    }
    .print-actions {
      margin-bottom: 1rem;
    }
    .print-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }
    .print-card {
      border: 3px dashed #333;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      background: #fff;
      color: #111;
      font-family: 'Courier New', monospace;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .print-card canvas.print-mob-img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto 0.6rem;
    }
    .print-card .print-mob-name {
      font-size: 1.3rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e94560;
      margin-bottom: 0.3rem;
    }
    .print-card .print-mob-stats {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.2rem;
    }
    .print-card .print-mob-desc {
      font-size: 0.8rem;
      font-style: italic;
      color: #777;
      margin-bottom: 0.8rem;
    }
    .print-card canvas.print-qr {
      width: 140px;
      height: 140px;
      display: block;
      margin: 0 auto;
    }

    /* ===== QR SCANNER ===== */
    #scanner-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      padding: 1.5rem;
      gap: 1rem;
    }
    #scanner-screen h2 {
      font-size: 1.6rem;
      color: #e94560;
    }
    .scanner-hint {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }
    #scanner-reader {
      width: 100%;
      max-width: 350px;
      border: 2px solid #e94560;
      border-radius: 8px;
      overflow: hidden;
    }
    #scanner-reader video {
      width: 100% !important;
      height: auto !important;
    }
    /* hide the default html5-qrcode header and file scan */
    #scanner-reader img[alt="Info"] { display: none !important; }
    #scanner-reader > div:last-child { display: none !important; }

    /* ===== PRINT MEDIA ===== */
    @media print {
      html, body {
        width: auto; height: auto;
        overflow: visible;
        background: #fff;
        color: #000;
      }
      .screen { display: none !important; }
      #print-screen {
        display: block !important;
        position: static;
        width: 100%;
        height: auto;
        padding: 0;
      }
      #print-screen h2,
      .print-actions,
      .dragon-notification { display: none !important; }
      .print-cards-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        max-width: 100%;
      }
      .print-card {
        border: 3px dashed #000;
        padding: 1rem;
      }
      .print-card .print-mob-name { color: #000; }
    }
  </style>
</head>
<body>

  <!-- ===== HOME ===== -->
  <div id="home-screen" class="screen active">
    <h1>MOB HUNT</h1>
    <p class="subtitle">Scan. Click. Slay.</p>
    <div class="score-display">Total Score: <span id="total-score">0</span></div>
    <button class="btn" onclick="openScanner()">Hunt</button>
    <button class="btn btn-small" onclick="showScreen('select-screen')">Mob List</button>
    <button class="btn btn-small" onclick="resetData()">Reset Progress</button>
  </div>

  <!-- ===== MOB SELECT ===== -->
  <div id="select-screen" class="screen">
    <h2>Choose Your Prey</h2>
    <div class="mob-grid" id="mob-grid"></div>
    <br>
    <button class="btn btn-small" onclick="showScreen('home-screen')">Back</button>
  </div>

  <!-- ===== QR SCREEN ===== -->
  <div id="qr-screen" class="screen">
    <h2 id="qr-title">QR Code</h2>
    <canvas id="qr-canvas" width="256" height="256"></canvas>
    <p class="qr-info">Scan this QR code to start the hunt! Or tap the button below to fight now.</p>
    <button class="btn" id="qr-fight-btn">Fight Now!</button>
    <br>
    <button class="btn btn-small" onclick="showScreen('select-screen')">Back</button>
  </div>

  <!-- ===== GAME ===== -->
  <div id="game-screen" class="screen">
    <div class="game-hud">
      <div class="hud-score">Score: <span id="game-score">0</span></div>
      <div class="hud-mob-name" id="game-mob-name"></div>
    </div>
    <div class="health-container">
      <div class="hearts-row" id="hearts-row"></div>
    </div>
    <div class="mob-area" id="mob-area">
      <canvas class="mob-sprite" id="mob-canvas" width="128" height="128"></canvas>
    </div>
  </div>

  <!-- ===== VICTORY ===== -->
  <div id="victory-screen" class="screen">
    <h2>MOB SLAIN!</h2>
    <canvas class="victory-mob" id="victory-mob-canvas" width="96" height="96"></canvas>
    <div class="victory-points" id="victory-points">+0</div>
    <div class="victory-label">points earned</div>
    <button class="btn" onclick="showScreen('select-screen')">Hunt Again</button>
    <button class="btn" onclick="showScreen('home-screen')">Home</button>
  </div>

  <!-- ===== PRINT CARDS ===== -->
  <div id="print-screen" class="screen">
    <h2>Printable Mob Cards</h2>
    <div class="print-actions">
      <button class="btn" onclick="window.print()">Print Cards</button>
      <button class="btn btn-small" onclick="showScreen('home-screen')">Back</button>
    </div>
    <div class="print-cards-grid" id="print-cards-grid"></div>
  </div>

  <!-- ===== QR SCANNER ===== -->
  <div id="scanner-screen" class="screen">
    <h2>Scan a Mob QR Code</h2>
    <p class="scanner-hint">Point your camera at a Mob Hunt QR code</p>
    <div id="scanner-reader"></div>
    <button class="btn btn-small" onclick="closeScanner()">Cancel</button>
  </div>

<script>
/* ================================================================
   MOB DATA
   ================================================================ */
const MOBS = {
  zombie: {
    name: 'Zombie',
    hearts: 10,
    points: 10,
    color: '#5b8731',
    darkColor: '#3d5c1f',
    eyeColor: '#000',
    description: 'Slow but relentless',
  },
  skeleton: {
    name: 'Skeleton',
    hearts: 10,
    points: 15,
    color: '#c8c8c8',
    darkColor: '#8a8a8a',
    eyeColor: '#222',
    description: 'Bony and brittle',
  },
  creeper: {
    name: 'Creeper',
    hearts: 10,
    points: 20,
    color: '#4caf50',
    darkColor: '#2e7d32',
    eyeColor: '#000',
    description: 'Ssssssneaky',
  },
  spider: {
    name: 'Spider',
    hearts: 8,
    points: 12,
    color: '#4a3728',
    darkColor: '#2c1f17',
    eyeColor: '#e94560',
    description: 'Eight-legged menace',
  },
  enderman: {
    name: 'Enderman',
    hearts: 20,
    points: 30,
    color: '#1a1a1a',
    darkColor: '#000',
    eyeColor: '#e040fb',
    description: 'Tall, dark, dangerous',
  },
  witch: {
    name: 'Witch',
    hearts: 13,
    points: 25,
    color: '#7b5ea7',
    darkColor: '#4a3668',
    eyeColor: '#000',
    description: 'Potion-brewing menace',
  },
  enderdragon: {
    name: 'Ender Dragon',
    hearts: 100,
    points: 500,
    color: '#1a1a1a',
    darkColor: '#0d0d0d',
    eyeColor: '#e040fb',
    accentColor: '#7b1fa2',
    wingColor: '#2c2c2c',
    description: 'The final boss',
    locked: true,
  },
};

/* ================================================================
   SOUND ENGINE (Web Audio API - Minecraft-style synthesis)
   ================================================================ */
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

/* Eagerly unlock AudioContext on any user interaction */
function unlockAudio() {
  ensureAudio();
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('click', unlockAudio);
document.addEventListener('touchstart', unlockAudio);

/* --- Utility: noise buffer --- */
function createNoiseBuffer(ctx, duration) {
  const sampleRate = ctx.sampleRate;
  const length = sampleRate * duration;
  const buffer = ctx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
  return buffer;
}

/* --- PUNCH SOUND (plays on every hit) --- */
/* Minecraft punch: short burst of low-mid noise with a sharp attack */
function playPunch() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Noise burst for the "thwack" */
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.1);

  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 800;
  noiseFilter.Q.value = 1.5;

  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.35, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(ctx.destination);
  noise.start(t);
  noise.stop(t + 0.1);

  /* Low thud */
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.06);

  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.4, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}

/* --- ZOMBIE HURT: low guttural groan --- */
function playZombieHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Groan: low sawtooth with vibrato */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  const baseFreq = 80 + Math.random() * 30;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.7, t + 0.3);

  /* Vibrato */
  const lfo = ctx.createOscillator();
  lfo.frequency.value = 6;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 10;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  lfo.start(t);
  lfo.stop(t + 0.35);

  /* Formant filter for "voice" quality */
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(400, t);
  filter.frequency.linearRampToValueAtTime(250, t + 0.3);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.setValueAtTime(0.3, t + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.4);
}

/* --- SKELETON HURT: bone rattle/clatter --- */
function playSkeletonHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Multiple short clicks/pops for bone rattling */
  for (let i = 0; i < 5; i++) {
    const offset = i * 0.035 + Math.random() * 0.015;

  oscGain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.2);
}

/* --- ENDERMAN HURT: warped static/teleport glitch --- */
function playEndermanHurt() {

/* --- ENDER DRAGON HURT: massive roar with distortion --- */
function playEnderdragonHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Deep roar - distorted low oscillator */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  const baseFreq = 60 + Math.random() * 20;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 1.5, t + 0.1);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.5, t + 0.4);

  const distortion = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i / 128) - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  distortion.curve = curve;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(600, t);
  filter.frequency.linearRampToValueAtTime(200, t + 0.4);
  filter.Q.value = 2;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.35, t);
  gain.gain.linearRampToValueAtTime(0.35, t + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

  osc.connect(distortion);
  distortion.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.55);

  /* High screech layer */
  const osc2 = ctx.createOscillator();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(800 + Math.random() * 200, t);
  osc2.frequency.exponentialRampToValueAtTime(200, t + 0.3);

  const g2 = ctx.createGain();
  g2.gain.setValueAtTime(0.1, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

  osc2.connect(g2);
  g2.connect(ctx.destination);
  osc2.start(t);
  osc2.stop(t + 0.4);

  /* Noise burst for impact */
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.3);

  const nf = ctx.createBiquadFilter();
  nf.type = 'lowpass';
  nf.frequency.value = 1000;

  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.25, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.3);

  noise.connect(nf);
  nf.connect(ng);
  ng.connect(ctx.destination);
  noise.start(t);
  noise.stop(t + 0.35);
}

/* --- MOB AMBIENT SOUNDS (looping background) --- */
let ambientInterval = null;

function startAmbientSound(mobKey) {
  stopAmbientSound();
  playAmbientOnce(mobKey);
  const delay = mobKey === 'enderdragon' ? 1500 : mobKey === 'enderman' ? 2000 : 3000 + Math.random() * 2000;
  ambientInterval = setInterval(() => playAmbientOnce(mobKey), delay);
}

function stopAmbientSound() {
  if (ambientInterval) {
    clearInterval(ambientInterval);
    ambientInterval = null;
  }
}

function playAmbientOnce(mobKey) {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  switch (mobKey) {
    case 'zombie': {
      /* Low distant groan */
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      const freq = 70 + Math.random() * 20;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.linearRampToValueAtTime(freq * 0.8, t + 0.8);

      const lfo = ctx.createOscillator();
      lfo.frequency.value = 3 + Math.random() * 2;
      const lfoG = ctx.createGain();
      lfoG.gain.value = 5;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);
      lfo.start(t);
      lfo.stop(t + 0.9);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 300;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.2);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.9);
      break;
    }
    case 'skeleton': {
      /* Bone rattling clicks */
      for (let i = 0; i < 3; i++) {

        noise.buffer = createNoiseBuffer(ctx, 0.02);

        const filt = ctx.createBiquadFilter();
        filt.type = 'highpass';
        filt.frequency.value = 3000 + Math.random() * 2000;

        const g = ctx.createGain();
        g.gain.setValueAtTime(0.06, t + off);
        g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.02);

        noise.connect(filt);
        filt.connect(g);
        g.connect(ctx.destination);
        noise.start(t + off);
        noise.stop(t + off + 0.03);
      }
      break;
    }
    case 'creeper': {
      /* Quiet sizzle/fuse hiss */

      const filt = ctx.createBiquadFilter();

      g.gain.linearRampToValueAtTime(0.05, t + 0.4);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);

      noise.connect(filt);
      filt.connect(g);
      g.connect(ctx.destination);
      noise.start(t);
      noise.stop(t + 0.6);
      break;
    }
    case 'spider': {

      for (let i = 0; i < 6; i++) {
        const off = i * 0.05;
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.value = 1200 + Math.random() * 800;

        const g = ctx.createGain();
        g.gain.setValueAtTime(0.04, t + off);
        g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.02);

        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t + off);
        osc.stop(t + off + 0.03);
      }
      break;
    }
    case 'enderman': {
      /* Eerie static/warble */
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(200 + Math.random() * 200, t);
      osc.frequency.setValueAtTime(400 + Math.random() * 300, t + 0.15);
      osc.frequency.setValueAtTime(150 + Math.random() * 100, t + 0.3);

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 600;
      filter.Q.value = 3;

      const g = ctx.createGain();

      g.gain.linearRampToValueAtTime(0.06, t + 0.05);
      g.gain.setValueAtTime(0.06, t + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

      osc.connect(filter);
      filter.connect(g);
      g.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.55);

        g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.08);

        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t + off);
        osc.stop(t + off + 0.1);
      }
      break;
    }
    case 'enderdragon': {
      /* Deep rumbling growl / wing beats */
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      const freq = 40 + Math.random() * 20;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.linearRampToValueAtTime(freq * 1.2, t + 0.3);
      osc.frequency.linearRampToValueAtTime(freq * 0.6, t + 1.0);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 200;
      filter.Q.value = 2;

      const g = ctx.createGain();
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.1, t + 0.15);
      g.gain.linearRampToValueAtTime(0.08, t + 0.6);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);

      osc.connect(filter);
      filter.connect(g);
      g.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 1.1);

      /* Wing beat whoosh */
      const noise = ctx.createBufferSource();
      noise.buffer = createNoiseBuffer(ctx, 0.5);

      const nf = ctx.createBiquadFilter();
      nf.type = 'bandpass';
      nf.frequency.setValueAtTime(300, t + 0.2);
      nf.frequency.linearRampToValueAtTime(600, t + 0.4);
      nf.frequency.linearRampToValueAtTime(200, t + 0.6);
      nf.Q.value = 1;

      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.001, t + 0.2);
      ng.gain.linearRampToValueAtTime(0.06, t + 0.35);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.6);

      noise.connect(nf);
      nf.connect(ng);
      ng.connect(ctx.destination);
      noise.start(t + 0.2);

  const nf = ctx.createBiquadFilter();
  nf.type = 'lowpass';
  nf.frequency.setValueAtTime(2000, t);

  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.4, t);

  noise.connect(nf);
  nf.connect(ng);
  ng.connect(ctx.destination);
  noise.start(t);

  const chimeDelay = 0.3;

    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t + chimeDelay + i * 0.08);
    osc.stop(t + chimeDelay + i * 0.08 + 0.25);
  });
}

/* ================================================================
   COOKIE HELPERS
   ================================================================ */
function setCookie(name, value, days = 365) {
  const d = new Date();
  d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
  document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))};expires=${d.toUTCString()};path=/;SameSite=Lax`;
}

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  if (match) {
    try { return JSON.parse(decodeURIComponent(match[2])); }
    catch { return null; }
  }
  return null;
}

function getPlayerData() {
  return getCookie('mob_hunt_data') || { totalScore: 0, kills: {} };
}

function savePlayerData(data) {
  setCookie('mob_hunt_data', data);
}

/* ================================================================
   MOB UNLOCK TRACKING
   Every mob is locked until its QR is scanned. The ?admin URL flag
   adds a "Fight Now!" override button. Ender Dragon also requires
   a points-threshold on top of the QR unlock.
   ================================================================ */
const IS_ADMIN = new URLSearchParams(window.location.search).has('admin');

function isMobUnlocked(mobKey) {
  /* Dragon unlocks via points threshold, not QR */
  if (mobKey === 'enderdragon') return isDragonUnlocked();
  const data = getPlayerData();
  return !!(data.unlockedMobs && data.unlockedMobs[mobKey]);
}

function unlockMob(mobKey) {
  const data = getPlayerData();
  if (!data.unlockedMobs) data.unlockedMobs = {};
  data.unlockedMobs[mobKey] = true;
  savePlayerData(data);
}

/* ================================================================
   ENDER DRAGON UNLOCK LOGIC
   ================================================================ */
/* Threshold = sum of points from each non-dragon mob (one kill of each) */
const DRAGON_UNLOCK_THRESHOLD = Object.entries(MOBS)
  .filter(([key]) => key !== 'enderdragon')
  .reduce((sum, [, mob]) => sum + mob.points, 0);

function isDragonUnlocked() {
  const data = getPlayerData();
  return data.totalScore >= DRAGON_UNLOCK_THRESHOLD;
}

function showDragonNotification() {
  /* Don't show if already dismissed this session */
  if (window._dragonNotifShown) return;
  window._dragonNotifShown = true;

  const overlay = document.createElement('div');
  overlay.className = 'dragon-notification';

  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;

  overlay.innerHTML = '<h2>The Enderdragon is here!</h2>';
  overlay.appendChild(canvas);

  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = 'Accept the Challenge';
  btn.onclick = () => {
    overlay.remove();
    showScreen('select-screen');
  };
  overlay.appendChild(btn);

  document.body.appendChild(overlay);

  /* Draw the dragon on the notification canvas */
  const ctx = canvas.getContext('2d');
  let frame = 0;
  function animDragonNotif() {
    frame++;
    drawMob(ctx, 'enderdragon', 128, frame);
    if (overlay.parentElement) requestAnimationFrame(animDragonNotif);
  }
  animDragonNotif();
}

/* ================================================================
   SCREEN MANAGEMENT
   ================================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'game-screen') {
    stopAmbientSound();
  }
  if (id === 'home-screen') {
    const data = getPlayerData();
    document.getElementById('total-score').textContent = data.totalScore;
  }
  if (id === 'select-screen') {
    renderMobGrid();
  }
}

/* ================================================================
   PIXEL ART MOB RENDERER
   ================================================================ */
function drawMob(ctx, mobKey, size, frame) {
  const mob = MOBS[mobKey];
  const s = size / 16; /* pixel scale */
  ctx.clearRect(0, 0, size, size);

  /* slight bounce from frame */
  const bounce = Math.sin(frame * 0.1) * s;
  ctx.save();
  ctx.translate(0, bounce);

  switch (mobKey) {
    case 'zombie':
      drawZombie(ctx, s, mob, frame);
      break;
    case 'skeleton':
      drawSkeleton(ctx, s, mob, frame);
      break;
    case 'creeper':
      drawCreeper(ctx, s, mob, frame);
      break;
    case 'spider':
      drawSpider(ctx, s, mob, frame);
      break;
    case 'enderman':
      drawEnderman(ctx, s, mob, frame);
      break;
    case 'witch':
      drawWitch(ctx, s, mob, frame);
      break;
    case 'enderdragon':
      drawEnderdragon(ctx, s, mob, frame);
      break;
  }

  ctx.restore();
}

function drawZombie(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 8*s);
  /* Hair */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 1*s, 8*s, 2*s);
  /* Eyes */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 4*s, 2*s, 2*s);
  ctx.fillRect(9*s, 4*s, 2*s, 2*s);
  /* Mouth */
  ctx.fillRect(6*s, 7*s, 4*s, 1*s);
  /* Body */
  ctx.fillStyle = '#4a8';
  ctx.fillRect(5*s, 9*s, 6*s, 4*s);
  /* Arms - animated */
  const armSwing = Math.sin(frame * 0.15) * 1.5 * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 9*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 9*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillStyle = '#336';
  const legSwing = Math.sin(frame * 0.12) * s;
  ctx.fillRect(6*s, 13*s + legSwing, 2*s, 3*s);
  ctx.fillRect(9*s, 13*s - legSwing, 2*s, 3*s);
}

function drawSkeleton(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 7*s);
  /* Eyes - dark hollows */
  ctx.fillStyle = '#222';
  ctx.fillRect(5*s, 3*s, 2*s, 2*s);
  ctx.fillRect(9*s, 3*s, 2*s, 2*s);
  /* Nose */
  ctx.fillRect(7*s, 5*s, 2*s, 1*s);
  /* Mouth */
  ctx.fillStyle = '#555';
  ctx.fillRect(5*s, 6*s, 6*s, 1*s);
  /* Spine */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(7*s, 8*s, 2*s, 5*s);
  /* Ribs */
  ctx.fillRect(5*s, 9*s, 6*s, 1*s);
  ctx.fillRect(5*s, 11*s, 6*s, 1*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.12) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 8*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillRect(6*s, 13*s, 1*s, 3*s);
  ctx.fillRect(9*s, 13*s, 1*s, 3*s);
}

function drawCreeper(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 0*s, 10*s, 8*s);
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(3*s, 0*s, 10*s, 1*s);
  /* Face - iconic creeper face */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 2*s, 2*s, 2*s);
  ctx.fillRect(9*s, 2*s, 2*s, 2*s);
  ctx.fillRect(7*s, 4*s, 2*s, 1*s);
  ctx.fillRect(6*s, 5*s, 4*s, 2*s);
  ctx.fillRect(6*s, 7*s, 1*s, 1*s);
  ctx.fillRect(9*s, 7*s, 1*s, 1*s);
  /* Body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 8*s, 6*s, 4*s);
  /* 4 Legs */
  const sway = Math.sin(frame * 0.1) * 0.5 * s;
  ctx.fillRect(5*s + sway, 12*s, 2*s, 4*s);
  ctx.fillRect(9*s - sway, 12*s, 2*s, 4*s);
}

function drawSpider(ctx, s, mob, frame) {
  /* Body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 5*s, 6*s, 4*s);
  /* Head */
  ctx.fillRect(3*s, 6*s, 3*s, 3*s);
  /* Abdomen */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(10*s, 5*s, 4*s, 5*s);
  /* Eyes - 8 red eyes! */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(3*s, 6*s, 1*s, 1*s);
  ctx.fillRect(5*s, 6*s, 1*s, 1*s);
  ctx.fillRect(3*s, 8*s, 1*s, 1*s);
  ctx.fillRect(5*s, 8*s, 1*s, 1*s);
  /* Legs - 4 on each side, animated */
  ctx.fillStyle = mob.color;
  for (let i = 0; i < 4; i++) {
    const legOff = Math.sin(frame * 0.15 + i * 1.5) * 1.5 * s;
    ctx.fillRect((5 + i * 1.5)*s, 3*s + legOff, 1*s, 2*s);
    ctx.fillRect((5 + i * 1.5)*s, 9*s - legOff, 1*s, 3*s);
  }
}

function drawEnderman(ctx, s, mob, frame) {
  /* Tall body */
  ctx.fillStyle = mob.color;
  /* Head */
  ctx.fillRect(4*s, 0, 8*s, 5*s);
  /* Eyes - purple glow */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 2*s, 2*s, 1*s);
  ctx.fillRect(9*s, 2*s, 2*s, 1*s);
  /* Body - thin */
  ctx.fillStyle = mob.color;
  ctx.fillRect(6*s, 5*s, 4*s, 5*s);
  /* Long arms */
  const armSwing = Math.sin(frame * 0.08) * 1.5 * s;
  ctx.fillRect(4*s, 5*s + armSwing, 2*s, 6*s);
  ctx.fillRect(10*s, 5*s - armSwing, 2*s, 6*s);
  /* Long legs */
  const legSwing = Math.sin(frame * 0.1) * s;
  ctx.fillRect(6*s, 10*s + legSwing, 2*s, 6*s);
  ctx.fillRect(9*s, 10*s - legSwing, 2*s, 6*s);
  /* Particles */
  ctx.fillStyle = mob.eyeColor;
  const px = 2 + Math.sin(frame * 0.2) * 3;
  const py = 2 + Math.cos(frame * 0.17) * 5;
  ctx.globalAlpha = 0.4 + Math.sin(frame * 0.3) * 0.3;
  ctx.fillRect(px*s, py*s, s, s);
  ctx.fillRect((14-px)*s, (py+2)*s, s, s);
  ctx.globalAlpha = 1;
}

function drawEnderdragon(ctx, s, mob, frame) {
  /* Wings - large and sweeping */
  const wingFlap = Math.sin(frame * 0.12) * 2 * s;
  ctx.fillStyle = mob.wingColor || '#2c2c2c';
  /* Left wing */
  ctx.fillRect(0, 3*s + wingFlap, 4*s, 5*s);
  ctx.fillRect(1*s, 2*s + wingFlap, 3*s, 1*s);
  /* Right wing */
  ctx.fillRect(12*s, 3*s - wingFlap, 4*s, 5*s);
  ctx.fillRect(12*s, 2*s - wingFlap, 3*s, 1*s);

  /* Body - long dragon body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 4*s, 6*s, 5*s);

  /* Spine ridge */
  ctx.fillStyle = mob.accentColor || '#7b1fa2';
  ctx.fillRect(7*s, 3*s, 2*s, 1*s);
  ctx.fillRect(6*s, 8*s, 4*s, 1*s);

  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 0, 6*s, 4*s);
  /* Horns */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 0, 1*s, 1*s);
  ctx.fillRect(10*s, 0, 1*s, 1*s);
  /* Snout */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 3*s, 4*s, 1*s);
  /* Eyes - glowing purple */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 1*s, 2*s, 2*s);
  ctx.fillRect(9*s, 1*s, 2*s, 2*s);
  /* Eye glow pulse */
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.2;
  ctx.fillRect(5*s, 1*s, 3*s, 2*s);
  ctx.fillRect(8*s, 1*s, 3*s, 2*s);
  ctx.globalAlpha = 1;

  /* Legs */
  ctx.fillStyle = mob.color;
  const legSwing = Math.sin(frame * 0.1) * s;
  ctx.fillRect(5*s, 9*s + legSwing, 2*s, 3*s);
  ctx.fillRect(9*s, 9*s - legSwing, 2*s, 3*s);
  /* Claws */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 12*s + legSwing, 2*s, 1*s);
  ctx.fillRect(9*s, 12*s - legSwing, 2*s, 1*s);

  /* Tail */
  ctx.fillStyle = mob.color;
  const tailSway = Math.sin(frame * 0.08) * 1.5 * s;
  ctx.fillRect(6*s, 13*s, 4*s, 1*s);
  ctx.fillRect(7*s + tailSway, 14*s, 3*s, 1*s);
  ctx.fillRect(8*s + tailSway * 1.5, 15*s, 2*s, 1*s);

  /* Ender particles */
  ctx.fillStyle = mob.eyeColor;
  for (let i = 0; i < 3; i++) {
    const px = 1 + Math.sin(frame * 0.2 + i * 2) * 6;
    const py = 1 + Math.cos(frame * 0.17 + i * 2.5) * 7;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.3 + i) * 0.3;
    ctx.fillRect(px * s, py * s, s, s);
  }
  ctx.globalAlpha = 1;
}

function drawWitch(ctx, s, mob, frame) {
  /* Hat */
  ctx.fillStyle = '#2c1f17';
  ctx.fillRect(7*s, 0, 2*s, 1*s);
  ctx.fillRect(5*s, 1*s, 6*s, 2*s);
  ctx.fillRect(3*s, 3*s, 10*s, 1*s);
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 4*s, 8*s, 6*s);
  /* Eyes */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 5*s, 2*s, 2*s);
  ctx.fillRect(9*s, 5*s, 2*s, 2*s);
  /* Nose - wart */
  ctx.fillStyle = '#6d4c41';
  ctx.fillRect(7*s, 7*s, 2*s, 2*s);
  /* Body / robe */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 10*s, 8*s, 4*s);
  /* Potion - bobbing */
  const potionBob = Math.sin(frame * 0.15) * s;
  ctx.fillStyle = '#76ff03';
  ctx.fillRect(2*s, 10*s + potionBob, 2*s, 2*s);
  ctx.fillStyle = '#33691e';
  ctx.fillRect(2*s, 9*s + potionBob, 2*s, 1*s);
  /* Legs */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 14*s, 2*s, 2*s);
  ctx.fillRect(9*s, 14*s, 2*s, 2*s);
}

/* ================================================================
   MOB SELECT GRID
   ================================================================ */
function renderMobGrid() {
  const grid = document.getElementById('mob-grid');
  grid.innerHTML = '';
  const dragonPointsUnlocked = isDragonUnlocked();

  for (const [key, mob] of Object.entries(MOBS)) {
    /* Ender Dragon has a special points-threshold lock */
    const isDragonLocked = mob.locked && !dragonPointsUnlocked;
    /* All other mobs are locked until scanned or "Fight Now!" */
    const isQrLocked = !isDragonLocked && !isMobUnlocked(key);

    const card = document.createElement('div');

    if (isDragonLocked) {
      /* Dragon locked behind points - fully locked, no Fight Now */
      card.className = 'mob-card locked dragon-locked';
      card.innerHTML = `
        <div class="lock-icon">&#128274;</div>
        <canvas class="mob-preview" width="64" height="64" data-mob="${key}"></canvas>
        <div class="mob-name">???</div>
        <div class="mob-info">Locked</div>
        <div class="lock-info">Need ${DRAGON_UNLOCK_THRESHOLD} pts to unlock</div>
      `;
      const canvas = card.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      drawMob(ctx, key, 64, 0);
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, 64, 64);
    } else if (isQrLocked) {
      /* Locked until QR scanned; admin gets Fight Now override */
      card.className = 'mob-card locked';
      card.innerHTML = `
        <div class="lock-icon">&#128274;</div>
        <canvas class="mob-preview" width="64" height="64" data-mob="${key}"></canvas>
        <div class="mob-name">???</div>
        <div class="mob-info">Scan QR to unlock</div>
        ${IS_ADMIN ? '<button class="fight-now-btn">Fight Now!</button>' : ''}
      `;
      const canvas = card.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      drawMob(ctx, key, 64, 0);
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, 64, 64);
      if (IS_ADMIN) {
        const btn = card.querySelector('.fight-now-btn');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          unlockMob(key);
          selectMob(key);
        });
      }
    } else {
      /* Fully unlocked */
      card.className = 'mob-card';
      card.innerHTML = `
        <canvas class="mob-preview" width="64" height="64" data-mob="${key}"></canvas>
        <div class="mob-name">${mob.name}</div>
        <div class="mob-info">${mob.hearts} HP / ${mob.points} pts</div>
        <div class="mob-info">${mob.description}</div>
      `;
      card.addEventListener('click', () => selectMob(key));
      const canvas = card.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      drawMob(ctx, key, 64, 0);
    }

    grid.appendChild(card);
  }
}

/* ================================================================
   QR CODE GENERATOR (using qrcode-generator library)
   ================================================================ */
function generateQR(mobKey) {
  const baseUrl = window.location.href.split('?')[0];
  const url = `${baseUrl}?mob=${mobKey}`;

  document.getElementById('qr-title').textContent = `${MOBS[mobKey].name} QR Code`;

  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');
  const size = 256;
  canvas.width = size;
  canvas.height = size;

  /* Use qrcode-generator library for a real scannable QR code */
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();

  const moduleCount = qr.getModuleCount();
  const cellSize = Math.floor(size / (moduleCount + 2));
  const padding = Math.floor((size - cellSize * moduleCount) / 2);

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);

  ctx.fillStyle = '#000';
  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(
          padding + col * cellSize,
          padding + row * cellSize,
          cellSize, cellSize
        );
      }
    }
  }

  /* Set up fight button */
  document.getElementById('qr-fight-btn').onclick = () => startGame(mobKey);

  /* Update the QR info */
  document.querySelector('.qr-info').innerHTML =
    `Scan this code or share this link:<br><strong style="color:#e94560;word-break:break-all;">${url}</strong>`;
}

function selectMob(mobKey) {
  showScreen('qr-screen');
  generateQR(mobKey);
}

/* ================================================================
   GAME ENGINE
   ================================================================ */
let currentMob = null;
let currentHealth = 0;
let maxHealth = 0;
let gameAnimFrame = 0;
let animationId = null;
let isGameActive = false;

function startGame(mobKey) {
  currentMob = mobKey;
  const mob = MOBS[mobKey];
  currentHealth = mob.hearts * 2; /* half-hearts */
  maxHealth = mob.hearts * 2;
  isGameActive = true;

  document.getElementById('game-mob-name').textContent = mob.name;
  document.getElementById('game-score').textContent = getPlayerData().totalScore;

  renderHearts();
  showScreen('game-screen');

  /* Start ambient mob sounds */
  startAmbientSound(mobKey);

  /* Start animation loop */
  gameAnimFrame = 0;
  if (animationId) cancelAnimationFrame(animationId);
  animateGame();
}

function animateGame() {
  gameAnimFrame++;
  const canvas = document.getElementById('mob-canvas');
  const ctx = canvas.getContext('2d');
  drawMob(ctx, currentMob, 128, gameAnimFrame);
  animationId = requestAnimationFrame(animateGame);
}

function renderHearts() {
  const row = document.getElementById('hearts-row');
  row.innerHTML = '';
  const totalHearts = maxHealth / 2;

  for (let i = 0; i < totalHearts; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    const halfHearts = currentHealth;
    const heartValue = (i + 1) * 2;

    if (halfHearts >= heartValue) {
      heart.innerHTML = heartSVG('full');
    } else if (halfHearts >= heartValue - 1) {
      heart.innerHTML = heartSVG('half');
    } else {
      heart.innerHTML = heartSVG('empty');
    }
    row.appendChild(heart);
  }
}

function heartSVG(type) {
  const color = type === 'empty' ? '#333' : '#e94560';
  const bg = type === 'empty' ? '#222' : '#a02040';

  if (type === 'half') {
    return `<svg viewBox="0 0 20 20">
      <path d="M10 18 Q0 10 0 6 Q0 2 4 2 Q7 2 10 5 Q13 2 16 2 Q20 2 20 6 Q20 10 10 18Z" fill="#333"/>
      <clipPath id="halfClip"><rect x="0" y="0" width="10" height="20"/></clipPath>
      <path d="M10 18 Q0 10 0 6 Q0 2 4 2 Q7 2 10 5 Q13 2 16 2 Q20 2 20 6 Q20 10 10 18Z" fill="${color}" clip-path="url(#halfClip)"/>
    </svg>`;
  }

  return `<svg viewBox="0 0 20 20">
    <path d="M10 18 Q0 10 0 6 Q0 2 4 2 Q7 2 10 5 Q13 2 16 2 Q20 2 20 6 Q20 10 10 18Z" fill="${color}"/>
  </svg>`;
}

/* ===== HIT HANDLING ===== */
function hitMob(e) {
  if (!isGameActive) return;

  /* Calculate damage: 1-3 half-hearts per hit */
  const damage = 1 + Math.floor(Math.random() * 3);
  currentHealth = Math.max(0, currentHealth - damage);

  /* Sound: punch + mob hurt */
  playPunch();
  if (MOB_HURT_SOUNDS[currentMob]) {
    MOB_HURT_SOUNDS[currentMob]();
  }

  /* Visual feedback */
  const canvas = document.getElementById('mob-canvas');
  canvas.classList.remove('hit');
  void canvas.offsetWidth; /* force reflow */
  canvas.classList.add('hit');
  setTimeout(() => canvas.classList.remove('hit'), 200);

  /* Damage number */
  spawnDamageNumber(e, damage);

  /* Particles */
  spawnParticles(e);

  /* Shake the heart that just lost */
  const hearts = document.querySelectorAll('.heart');
  const heartIndex = Math.floor(currentHealth / 2);
  if (hearts[heartIndex]) {
    hearts[heartIndex].classList.add('damaged');
    setTimeout(() => hearts[heartIndex].classList.remove('damaged'), 300);
  }

  renderHearts();

  /* Check death */
  if (currentHealth <= 0) {
    mobDied();
  }
}

function spawnDamageNumber(e, damage) {
  const gameScreen = document.getElementById('game-screen');
  const num = document.createElement('div');
  num.className = 'damage-number';
  const hearts = damage / 2;
  num.textContent = `-${hearts}`;

  const rect = gameScreen.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX || rect.width/2) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY || rect.height/2) - rect.top;

  num.style.left = (x - 15) + 'px';
  num.style.top = (y - 20) + 'px';
  gameScreen.appendChild(num);
  setTimeout(() => num.remove(), 800);
}

function spawnParticles(e) {
  const gameScreen = document.getElementById('game-screen');
  const rect = gameScreen.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX || rect.width/2) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY || rect.height/2) - rect.top;
  const mob = MOBS[currentMob];

  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = i % 2 === 0 ? mob.color : '#e94560';
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 40;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    gameScreen.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

function mobDied() {
  isGameActive = false;

  /* Stop ambient sounds and play death sound */
  stopAmbientSound();
  playDeathSound();

  const canvas = document.getElementById('mob-canvas');
  canvas.classList.add('dying');

  setTimeout(() => {
    canvas.classList.remove('dying');
    if (animationId) cancelAnimationFrame(animationId);

    /* Award points */
    const mob = MOBS[currentMob];
    const data = getPlayerData();
    const wasUnlocked = data.totalScore >= DRAGON_UNLOCK_THRESHOLD;
    data.totalScore += mob.points;
    if (!data.kills[currentMob]) data.kills[currentMob] = 0;
    data.kills[currentMob]++;
    savePlayerData(data);

    const nowUnlocked = data.totalScore >= DRAGON_UNLOCK_THRESHOLD;

    /* Show victory */
    document.getElementById('victory-points').textContent = `+${mob.points}`;
    const victoryCanvas = document.getElementById('victory-mob-canvas');
    const ctx = victoryCanvas.getContext('2d');
    drawMob(ctx, currentMob, 96, 0);
    showScreen('victory-screen');

    /* Check if dragon was just unlocked */
    if (!wasUnlocked && nowUnlocked && currentMob !== 'enderdragon') {
      setTimeout(() => showDragonNotification(), 1500);
    }
  }, 900);
}

/* Attach click/tap handler to game screen */
document.getElementById('mob-area').addEventListener('click', hitMob);
document.getElementById('mob-area').addEventListener('touchstart', (e) => {
  e.preventDefault();
  hitMob(e);
}, { passive: false });

/* ================================================================
   QR SCANNER (camera-based hunt)
   ================================================================ */
let html5QrScanner = null;

function openScanner() {
  showScreen('scanner-screen');
  startScanner();
}

function closeScanner() {
  stopScanner();
  showScreen('home-screen');
}

function startScanner() {
  stopScanner();
  html5QrScanner = new Html5Qrcode('scanner-reader');
  html5QrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess,
    () => {} /* ignore scan failures (no QR in frame) */
  ).catch(() => {
    /* Camera access denied or unavailable */
    document.querySelector('.scanner-hint').textContent =
      'Camera not available. Check permissions and try again.';
  });
}

function stopScanner() {
  if (html5QrScanner) {
    html5QrScanner.stop().catch(() => {});
    html5QrScanner.clear();
    html5QrScanner = null;
  }
}

function onScanSuccess(decodedText) {
  /* Extract mob key from scanned URL (e.g. ...?mob=zombie) */
  let mobKey = null;
  try {
    const url = new URL(decodedText);
    mobKey = url.searchParams.get('mob');
  } catch {
    /* Not a valid URL - ignore */
    return;
  }

  if (!mobKey || !MOBS[mobKey]) return;

  /* Block dragon if points threshold not met */
  if (MOBS[mobKey].locked && !isDragonUnlocked()) return;

  /* Stop the scanner and unlock + fight */
  stopScanner();
  unlockMob(mobKey);
  startGame(mobKey);
}

/* Stop scanner when navigating away */
const _origShowScreen = showScreen;
showScreen = function(id) {
  if (id !== 'scanner-screen') stopScanner();
  _origShowScreen(id);
};

/* ================================================================
   PRINTABLE CARDS
   ================================================================ */
function generateQRCanvas(mobKey, size) {
  const baseUrl = window.location.href.split('?')[0];
  const url = `${baseUrl}?mob=${mobKey}`;

  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();

  const moduleCount = qr.getModuleCount();
  const cellSize = Math.floor(size / (moduleCount + 2));
  const padding = Math.floor((size - cellSize * moduleCount) / 2);

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000';
  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(
          padding + col * cellSize,
          padding + row * cellSize,
          cellSize, cellSize
        );
      }
    }
  }
  return canvas;
}

function renderPrintCards() {
  const grid = document.getElementById('print-cards-grid');
  grid.innerHTML = '';

  for (const [key, mob] of Object.entries(MOBS)) {
    const card = document.createElement('div');
    card.className = 'print-card';

    /* Mob image */
    const mobCanvas = document.createElement('canvas');
    mobCanvas.className = 'print-mob-img';
    mobCanvas.width = 128;
    mobCanvas.height = 128;
    const mobCtx = mobCanvas.getContext('2d');
    drawMob(mobCtx, key, 128, 0);

    /* QR code */
    const qrCanvas = generateQRCanvas(key, 200);
    qrCanvas.className = 'print-qr';

    /* Text elements */
    const nameEl = document.createElement('div');
    nameEl.className = 'print-mob-name';
    nameEl.textContent = mob.name;

    const statsEl = document.createElement('div');
    statsEl.className = 'print-mob-stats';
    statsEl.textContent = `${mob.hearts} HP  /  ${mob.points} PTS`;

    const descEl = document.createElement('div');
    descEl.className = 'print-mob-desc';
    descEl.textContent = mob.description;

    card.appendChild(mobCanvas);
    card.appendChild(nameEl);
    card.appendChild(statsEl);
    card.appendChild(descEl);
    card.appendChild(qrCanvas);

    grid.appendChild(card);
  }
}

/* ================================================================
   RESET
   ================================================================ */
function resetData() {
  if (confirm('Reset all progress? This cannot be undone!')) {
    savePlayerData({ totalScore: 0, kills: {} });
    document.getElementById('total-score').textContent = '0';
  }
}

/* ================================================================
   URL PARAM HANDLING (QR code entry point)
   ================================================================ */
function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);

  /* ?print — show the printable cards page */
  if (params.has('print')) {
    renderPrintCards();
    showScreen('print-screen');
    return;
  }

  const mobKey = params.get('mob');
  if (mobKey && MOBS[mobKey]) {
    /* Block dragon if points threshold not met */
    if (MOBS[mobKey].locked && !isDragonUnlocked()) return;
    /* Scanning a QR unlocks that mob permanently */
    unlockMob(mobKey);
    startGame(mobKey);
  }
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  const data = getPlayerData();
  document.getElementById('total-score').textContent = data.totalScore;
  renderMobGrid();
  checkUrlParams();

  /* Show dragon notification on load if already unlocked and never fought */
  if (isDragonUnlocked() && !data.kills['enderdragon']) {
    showDragonNotification();
  }
}

init();
</script>
