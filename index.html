<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mob Hunt</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    .screen.active { display: flex; }

    /* ===== HOME SCREEN ===== */
    #home-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    #home-screen h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
      color: #e94560;
      margin-bottom: 0.5rem;
      letter-spacing: 0.2em;
    }
    #home-screen .subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .score-display {
      font-size: 1.4rem;
      color: #ffd700;
      margin-bottom: 1.5rem;
    }
    .score-display span { font-weight: bold; }
    .btn {
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      font-family: inherit;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      margin: 0.4rem;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }
    .btn:hover, .btn:active {
      background: #e94560;
      color: #fff;
    }
    .btn-small {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
    }

    /* ===== BIG HUNT BUTTON ===== */
    .btn-hunt {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.2rem 3rem;
      font-size: 1.8rem;
      font-family: inherit;
      border: 3px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
      margin: 0.6rem;
    }
    .btn-hunt:hover, .btn-hunt:active {
      background: #e94560;
      color: #fff;
    }
    .btn-hunt:hover .sword-icon, .btn-hunt:active .sword-icon {
      filter: brightness(0) invert(1);
    }
    .sword-icon {
      width: 40px;
      height: 40px;
      transition: filter 0.2s;
    }

    /* ===== MOB SELECT ===== */
    #select-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      overflow-y: auto;
      justify-content: flex-start;
      padding: 1.5rem;
    }
    #select-screen h2 {
      font-size: 1.8rem;
      color: #e94560;
      margin-bottom: 1rem;
    }
    .mob-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }
    .mob-card {
      background: #16213e;
      border: 2px solid #333;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mob-card:hover, .mob-card:active {
      border-color: #e94560;
      transform: scale(1.05);
    }
    .mob-card .mob-preview {
      width: 64px; height: 64px;
      margin: 0 auto 0.5rem;
      image-rendering: pixelated;
    }
    .mob-card .mob-name {
      font-size: 0.9rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .mob-card .mob-info {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }

    /* ===== QR SCREEN ===== */
    #qr-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      padding: 1.5rem;
    }
    #qr-screen h2 {
      font-size: 1.4rem;
      color: #e94560;
      margin-bottom: 1rem;
    }
    #qr-canvas {
      background: #fff;
      padding: 16px;
      margin-bottom: 1rem;
    }
    .qr-info {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      background: linear-gradient(180deg, #2d1b3d 0%, #1a1a2e 40%, #0d2137 100%);
      cursor: crosshair;
    }
    .game-hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .hud-score {
      font-size: 1.2rem;
      color: #ffd700;
    }
    .hud-mob-name {
      font-size: 1rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* Health bar */
    .health-container {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .hearts-row {
      display: flex;
      gap: 2px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 300px;
    }
    .heart {
      width: 20px; height: 20px;
      position: relative;
      transition: transform 0.15s;
    }
    .heart.damaged {
      animation: heartPop 0.3s ease;
    }
    .heart svg { width: 100%; height: 100%; }
    .heart-full { fill: #e94560; }
    .heart-half { fill: #e94560; }
    .heart-empty { fill: #333; }

    @keyframes heartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* Mob display area */
    .mob-area {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mob-sprite {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      animation: mobIdle 0.8s ease-in-out infinite;
      transition: filter 0.1s;
    }
    .mob-sprite.hit {
      animation: mobHit 0.2s ease;
      filter: brightness(3);
    }
    .mob-sprite.dying {
      animation: mobDeath 0.8s ease forwards;
    }

    @keyframes mobIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes mobHit {
      0% { transform: translateX(0) scale(1); }
      25% { transform: translateX(-10px) scale(1.05); }
      50% { transform: translateX(10px) scale(1.05); }
      75% { transform: translateX(-5px) scale(1.02); }
      100% { transform: translateX(0) scale(1); }
    }
    @keyframes mobDeath {
      0% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
      30% { transform: scale(1.2) rotate(5deg); opacity: 1; filter: brightness(2); }
      100% { transform: scale(0) rotate(180deg); opacity: 0; filter: brightness(5); }
    }

    /* Damage numbers */
    .damage-number {
      position: absolute;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ff4444;
      pointer-events: none;
      animation: damageFloat 0.8s ease-out forwards;
      z-index: 20;
      text-shadow: 0 0 4px #000, 2px 2px 0 #000;
    }
    @keyframes damageFloat {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-80px) scale(0.5); opacity: 0; }
    }

    /* Click particles */
    .particle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFly 0.5s ease-out forwards;
      z-index: 20;
    }
    @keyframes particleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ===== VICTORY SCREEN ===== */
    #victory-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #0d3b1e 50%, #1a1a2e 100%);
    }
    #victory-screen h2 {
      font-size: 2.2rem;
      color: #4caf50;
      text-shadow: 0 0 20px #4caf50;
      margin-bottom: 1rem;
      animation: victoryPulse 1s ease-in-out infinite;
    }
    @keyframes victoryPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .victory-points {
      font-size: 3rem;
      color: #ffd700;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .victory-label {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .victory-mob {
      width: 96px; height: 96px;
      image-rendering: pixelated;
      margin-bottom: 1.5rem;
      opacity: 0.3;
      filter: grayscale(1);
    }

    /* ===== LOCKED MOB CARD ===== */
    .mob-card.locked {
      opacity: 0.6;
      border-color: #555;
      position: relative;
      cursor: default;
    }
    .mob-card.locked:hover, .mob-card.locked:active {
      border-color: #777;
      transform: none;
    }
    .mob-card .lock-icon {
      font-size: 1.5rem;
      color: #888;
      margin-bottom: 0.25rem;
    }
    .mob-card .lock-info {
      font-size: 0.7rem;
      color: #e94560;
      margin-top: 0.25rem;
    }
    .mob-card .fight-now-btn {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.25rem 0.6rem;
      font-size: 0.7rem;
      font-family: inherit;
      border: 1px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .mob-card .fight-now-btn:hover, .mob-card .fight-now-btn:active {
      background: #e94560;
      color: #fff;
    }
    /* Dragon-locked (points threshold) stays fully locked */
    .mob-card.dragon-locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .mob-card.dragon-locked:hover, .mob-card.dragon-locked:active {
      border-color: #555;
      transform: none;
    }

    /* ===== WITHER SKULL DISPLAY ===== */
    .skull-display {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-left: 0.8rem;
      color: #aaa;
      font-size: 1.1rem;
    }
    .skull-display .skull-icon {
      width: 20px;
      height: 20px;
      image-rendering: pixelated;
    }

    /* ===== SPECIAL EVENT OVERLAY ===== */
    .event-notification {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: dragonFadeIn 0.5s ease;
    }
    .event-notification h2 {
      font-size: 1.8rem;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      margin-bottom: 1rem;
      animation: dragonPulse 1.5s ease-in-out infinite;
      text-align: center;
      padding: 0 1rem;
    }
    .event-notification canvas {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      margin-bottom: 1.5rem;
    }
    .event-notification .btn {
      border-color: currentColor;
      color: inherit;
    }
    .event-notification .btn:hover, .event-notification .btn:active {
      background: currentColor;
      color: #fff;
    }
    .warden-event { color: #00838f; }
    .wither-event { color: #555; }

    /* ===== DRAGON UNLOCKED NOTIFICATION ===== */
    .dragon-notification {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: dragonFadeIn 0.5s ease;
    }
    .dragon-notification h2 {
      font-size: 2rem;
      color: #e040fb;
      text-shadow: 0 0 30px #e040fb, 0 0 60px #7b1fa2;
      margin-bottom: 1rem;
      animation: dragonPulse 1.5s ease-in-out infinite;
      text-align: center;
      padding: 0 1rem;
    }
    .dragon-notification canvas {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      margin-bottom: 1.5rem;
    }
    .dragon-notification .btn {
      border-color: #e040fb;
      color: #e040fb;
    }
    .dragon-notification .btn:hover, .dragon-notification .btn:active {
      background: #e040fb;
      color: #fff;
    }
    @keyframes dragonFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes dragonPulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 30px #e040fb, 0 0 60px #7b1fa2; }
      50% { transform: scale(1.05); text-shadow: 0 0 50px #e040fb, 0 0 80px #7b1fa2; }
    }

    /* ===== PRINT CARDS PAGE ===== */
    #print-screen {
      background: #fff;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 1rem;
    }
    #print-screen h2 {
      font-size: 1.6rem;
      color: #e94560;
      margin-bottom: 1rem;
    }
    .print-actions {
      margin-bottom: 1rem;
    }
    .print-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }
    .print-card {
      border: 3px dashed #333;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      background: #fff;
      color: #111;
      font-family: 'Courier New', monospace;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .print-card canvas.print-mob-img {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      display: block;
      margin: 0 auto 0.6rem;
    }
    .print-card .print-mob-name {
      font-size: 1.3rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e94560;
      margin-bottom: 0.3rem;
    }
    .print-card .print-mob-stats {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.2rem;
    }
    .print-card .print-mob-desc {
      font-size: 0.8rem;
      font-style: italic;
      color: #777;
      margin-bottom: 0.8rem;
    }
    .print-card canvas.print-qr {
      width: 140px;
      height: 140px;
      display: block;
      margin: 0 auto;
    }

    /* ===== QR SCANNER ===== */
    #scanner-screen {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      padding: 1.5rem;
      gap: 1rem;
    }
    #scanner-screen h2 {
      font-size: 1.6rem;
      color: #e94560;
    }
    .scanner-hint {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }
    #scanner-reader {
      width: 100%;
      max-width: 350px;
      border: 2px solid #e94560;
      border-radius: 8px;
      overflow: hidden;
    }
    #scanner-reader video {
      width: 100% !important;
      height: auto !important;
    }
    /* hide the default html5-qrcode header and file scan */
    #scanner-reader img[alt="Info"] { display: none !important; }
    #scanner-reader > div:last-child { display: none !important; }

    /* ===== ESCAPE BUTTON ===== */
    .btn-escape {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
      z-index: 20;
    }
    .btn-escape:hover, .btn-escape:active {
      background: #e94560;
      color: #fff;
    }
    .btn-escape:hover .boot-icon, .btn-escape:active .boot-icon {
      filter: brightness(0) invert(1);
    }
    .boot-icon {
      width: 24px;
      height: 24px;
      transition: filter 0.2s;
    }
    #game-screen .btn-escape {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ===== PRINT MEDIA ===== */
    @media print {
      html, body {
        width: auto; height: auto;
        overflow: visible;
        background: #fff;
        color: #000;
      }
      .screen { display: none !important; }
      #print-screen {
        display: block !important;
        position: static;
        width: 100%;
        height: auto;
        padding: 0;
      }
      #print-screen h2,
      .print-actions,
      .dragon-notification { display: none !important; }
      .print-cards-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        max-width: 100%;
      }
      .print-card {
        border: 3px dashed #000;
        padding: 1rem;
      }
      .print-card .print-mob-name { color: #000; }
    }
  </style>
</head>
<body>

  <!-- ===== HOME ===== -->
  <div id="home-screen" class="screen active">
    <h1>MOB HUNT</h1>
    <p class="subtitle">Scan. Click. Slay.</p>
    <div class="score-display">Total Score: <span id="total-score">0</span><span id="skull-display-home" class="skull-display" style="display:none;"><svg class="skull-icon" viewBox="0 0 16 16"><rect x="3" y="2" width="10" height="8" fill="#333"/><rect x="5" y="10" width="6" height="3" fill="#222"/><rect x="5" y="4" width="2" height="2" fill="#555"/><rect x="9" y="4" width="2" height="2" fill="#555"/><rect x="6" y="8" width="1" height="2" fill="#555"/><rect x="9" y="8" width="1" height="2" fill="#555"/></svg> <span id="skull-count-home">0</span>/3</span></div>
    <button class="btn-hunt" onclick="openScanner()">
      <svg class="sword-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">

        <rect x="8" y="22" width="2" height="2" fill="#A0522D"/>
        <rect x="4" y="22" width="2" height="2" fill="#FFD700"/>
        <rect x="6" y="20" width="2" height="2" fill="#FFD700"/>
        <rect x="8" y="24" width="2" height="2" fill="#FFD700"/>
        <rect x="10" y="22" width="2" height="2" fill="#FFD700"/>
        <rect x="10" y="20" width="2" height="2" fill="#4FC3F7"/>
        <rect x="12" y="18" width="2" height="2" fill="#4FC3F7"/>
        <rect x="14" y="16" width="2" height="2" fill="#4FC3F7"/>

        <rect x="26" y="4" width="2" height="2" fill="#29B6F6"/>
        <rect x="28" y="2" width="2" height="2" fill="#81D4FA"/>
        <rect x="26" y="2" width="2" height="2" fill="#81D4FA"/>
        <rect x="28" y="4" width="2" height="2" fill="#81D4FA"/>
      </svg>
      Hunt
    </button>
    <button class="btn btn-small" onclick="navigateTo('list')">Mob List</button>
    <button class="btn btn-small" onclick="resetData()">Reset Progress</button>
    <button class="btn btn-small" onclick="navigateTo('print')" id="home-print-btn" style="display:none;">Print</button>
  </div>

  <!-- ===== MOB SELECT ===== -->
  <div id="select-screen" class="screen">
    <div class="score-display">Total Score: <span id="select-total-score">0</span></div>
    <button class="btn-hunt" onclick="openScanner()" style="margin-bottom: 1rem;">
      <svg class="sword-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="28" width="4" height="4" fill="#8B4513"/>
        <rect x="4" y="26" width="4" height="4" fill="#8B4513"/>
        <rect x="6" y="24" width="2" height="2" fill="#A0522D"/>
        <rect x="8" y="22" width="2" height="2" fill="#A0522D"/>
        <rect x="4" y="22" width="2" height="2" fill="#FFD700"/>
        <rect x="6" y="20" width="2" height="2" fill="#FFD700"/>
        <rect x="8" y="24" width="2" height="2" fill="#FFD700"/>
        <rect x="10" y="22" width="2" height="2" fill="#FFD700"/>
        <rect x="10" y="20" width="2" height="2" fill="#4FC3F7"/>
        <rect x="12" y="18" width="2" height="2" fill="#4FC3F7"/>
        <rect x="14" y="16" width="2" height="2" fill="#4FC3F7"/>
        <rect x="16" y="14" width="2" height="2" fill="#4FC3F7"/>
        <rect x="18" y="12" width="2" height="2" fill="#4FC3F7"/>
        <rect x="20" y="10" width="2" height="2" fill="#29B6F6"/>

/* ================================================================
   SOUND ENGINE (Web Audio API - Minecraft-style synthesis)
   ================================================================ */
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

/* Eagerly unlock AudioContext on any user interaction */
function unlockAudio() {
  ensureAudio();
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('click', unlockAudio);
document.addEventListener('touchstart', unlockAudio);

/* --- Utility: noise buffer --- */
function createNoiseBuffer(ctx, duration) {
  const sampleRate = ctx.sampleRate;
  const length = sampleRate * duration;
  const buffer = ctx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
  return buffer;
}

/* --- PUNCH SOUND (plays on every hit) --- */
/* Minecraft punch: short burst of low-mid noise with a sharp attack */
function playPunch() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Noise burst for the "thwack" */
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.1);

  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 800;
  noiseFilter.Q.value = 1.5;

  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.35, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(ctx.destination);
  noise.start(t);
  noise.stop(t + 0.1);

  /* Low thud */
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.06);

  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.4, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}

/* --- ZOMBIE HURT: low guttural groan --- */
function playZombieHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Groan: low sawtooth with vibrato */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  const baseFreq = 80 + Math.random() * 30;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.7, t + 0.3);

  /* Vibrato */
  const lfo = ctx.createOscillator();
  lfo.frequency.value = 6;
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 10;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  lfo.start(t);
  lfo.stop(t + 0.35);

  /* Formant filter for "voice" quality */
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(400, t);
  filter.frequency.linearRampToValueAtTime(250, t + 0.3);
  filter.Q.value = 3;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.setValueAtTime(0.3, t + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.4);
}

/* --- SKELETON HURT: bone rattle/clatter --- */
function playSkeletonHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Multiple short clicks/pops for bone rattling */
  for (let i = 0; i < 5; i++) {
    const offset = i * 0.035 + Math.random() * 0.015;

    const noise = ctx.createBufferSource();
    noise.buffer = createNoiseBuffer(ctx, 0.03);

    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 2000 + Math.random() * 3000;
    filter.Q.value = 8;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.25, t + offset);
    gain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.025);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(t + offset);
    noise.stop(t + offset + 0.03);
  }

  /* A hollow "xylophone" tone */
  const osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
  osc.frequency.exponentialRampToValueAtTime(300, t + 0.15);

  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.15, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);

  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.2);
}

/* --- CREEPER HURT: sizzling hiss --- */
function playCreeperHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Filtered noise hiss that rises in pitch */
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.4);

  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(3000, t);
  filter.frequency.exponentialRampToValueAtTime(6000, t + 0.2);
  filter.frequency.exponentialRampToValueAtTime(2000, t + 0.35);
  filter.Q.value = 2;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.001, t);
  gain.gain.linearRampToValueAtTime(0.3, t + 0.03);
  gain.gain.setValueAtTime(0.3, t + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  noise.start(t);
  noise.stop(t + 0.4);

  /* A subtle low "fuse" tone underneath */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, t);
  osc.frequency.linearRampToValueAtTime(180, t + 0.2);

  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.08, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);

  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.35);
}

/* --- SPIDER HURT: screechy hiss/squeal --- */
function playSpiderHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* High-pitched squeal */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  const baseFreq = 600 + Math.random() * 200;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 1.5, t + 0.05);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.6, t + 0.2);

  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 400;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.3);

  /* Hiss noise layer */
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.2);

  const nf = ctx.createBiquadFilter();
  nf.type = 'highpass';
  nf.frequency.value = 5000;

  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.15, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);

  noise.connect(nf);
  nf.connect(ng);

/* --- ENDER DRAGON HURT: massive roar with distortion --- */
function playEnderdragonHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  /* Deep roar - distorted low oscillator */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  const baseFreq = 60 + Math.random() * 20;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * 1.5, t + 0.1);
  osc.frequency.linearRampToValueAtTime(baseFreq * 0.5, t + 0.4);

  const distortion = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i / 128) - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  distortion.curve = curve;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(600, t);
  filter.frequency.linearRampToValueAtTime(200, t + 0.4);
  filter.Q.value = 2;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.35, t);
  gain.gain.linearRampToValueAtTime(0.35, t + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

  osc.connect(distortion);
  distortion.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.55);

  /* High screech layer */
  const osc2 = ctx.createOscillator();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(800 + Math.random() * 200, t);
  osc2.frequency.exponentialRampToValueAtTime(200, t + 0.3);

  const g2 = ctx.createGain();
  g2.gain.setValueAtTime(0.1, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

  osc2.connect(g2);
  g2.connect(ctx.destination);
  osc2.start(t);
  osc2.stop(t + 0.4);

  /* Noise burst for impact */
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.3);

  const nf = ctx.createBiquadFilter();
  nf.type = 'lowpass';
  nf.frequency.value = 1000;

  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.25, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.3);

  noise.connect(nf);
  nf.connect(ng);
  ng.connect(ctx.destination);
  noise.start(t);
  noise.stop(t + 0.35);
}

/* --- MOB AMBIENT SOUNDS (looping background) --- */
let ambientInterval = null;

function startAmbientSound(mobKey) {
  stopAmbientSound();
  playAmbientOnce(mobKey);
  const delay = mobKey === 'enderdragon' ? 1500 : mobKey === 'warden' ? 1500 : mobKey === 'wither' ? 1500 : mobKey === 'enderman' ? 2000 : 3000 + Math.random() * 2000;
  ambientInterval = setInterval(() => playAmbientOnce(mobKey), delay);
}

function stopAmbientSound() {
  if (ambientInterval) {
    clearInterval(ambientInterval);
    ambientInterval = null;
  }
}

function playAmbientOnce(mobKey) {
  const ctx = ensureAudio();
  const t = ctx.currentTime;

  switch (mobKey) {
    case 'zombie': {
      /* Low distant groan */
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      const freq = 70 + Math.random() * 20;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.linearRampToValueAtTime(freq * 0.8, t + 0.8);

      const lfo = ctx.createOscillator();
      lfo.frequency.value = 3 + Math.random() * 2;
      const lfoG = ctx.createGain();
      lfoG.gain.value = 5;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);
      lfo.start(t);
      lfo.stop(t + 0.9);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 300;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.2);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.9);
      break;
    }
    case 'skeleton': {
      /* Bone rattling clicks */
      for (let i = 0; i < 3; i++) {

        noise.buffer = createNoiseBuffer(ctx, 0.02);

        const filt = ctx.createBiquadFilter();
        filt.type = 'highpass';
        filt.frequency.value = 3000 + Math.random() * 2000;

        const g = ctx.createGain();
        g.gain.setValueAtTime(0.06, t + off);
        g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.02);

        noise.connect(filt);
        filt.connect(g);
        g.connect(ctx.destination);
        noise.start(t + off);
        noise.stop(t + off + 0.03);

    }

    case 'enderman': {

  const nf = ctx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.value = 200;
  const ng = ctx.createGain(); ng.gain.setValueAtTime(0.2, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  noise.connect(nf); nf.connect(ng); ng.connect(ctx.destination); noise.start(t); noise.stop(t + 0.35);
}

/* --- WITHER HURT: multi-tone screech --- */
function playWitherHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  for (let i = 0; i < 3; i++) {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    const freq = 150 + i * 100 + Math.random() * 50;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + 0.3);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t + 0.35);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.25);
  const nf = ctx.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 1000; nf.Q.value = 2;
  const ng = ctx.createGain(); ng.gain.setValueAtTime(0.2, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  noise.connect(nf); nf.connect(ng); ng.connect(ctx.destination); noise.start(t); noise.stop(t + 0.3);
}

/* --- PHANTOM HURT: swooshy screech --- */
function playPhantomHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(1000, t);
  osc.frequency.exponentialRampToValueAtTime(300, t + 0.2);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t + 0.3);
}

/* --- GUARDIAN HURT: laser zap --- */
function playGuardianHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(2000, t);
  osc.frequency.exponentialRampToValueAtTime(400, t + 0.15);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t + 0.25);
}

/* --- SHULKER HURT: shell clack --- */
function playShulkerHurt() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  const noise = ctx.createBufferSource();
  noise.buffer = createNoiseBuffer(ctx, 0.05);
  const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 3000; f.Q.value = 10;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(t); noise.stop(t + 0.06);
  const osc = ctx.createOscillator();
  osc.type = 'triangle'; osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(200, t + 0.1);
  const og = ctx.createGain(); og.gain.setValueAtTime(0.15, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(og); og.connect(ctx.destination); osc.start(t); osc.stop(t + 0.15);
}

/* ================================================================
   COOKIE HELPERS
   ================================================================ */
function setCookie(name, value, days = 365) {
  const d = new Date();
  d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
  document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))};expires=${d.toUTCString()};path=/;SameSite=Lax`;
}

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  if (match) {
    try { return JSON.parse(decodeURIComponent(match[2])); }
    catch { return null; }
  }
  return null;
}

function getPlayerData() {
  return getCookie('mob_hunt_data') || { totalScore: 0, kills: {} };
}

function savePlayerData(data) {
  setCookie('mob_hunt_data', data);
}

/* ================================================================
   MOB UNLOCK TRACKING
   Every mob is locked until its QR is scanned. The ?admin URL flag
   adds a "Fight Now!" override button. Ender Dragon also requires
   a points-threshold on top of the QR unlock.
   ================================================================ */
const IS_ADMIN = new URLSearchParams(window.location.search).has('admin');

if (IS_ADMIN) {
  document.getElementById('home-print-btn').style.display = '';
}

function isMobUnlocked(mobKey) {
  /* Dragon unlocks via points threshold */
  if (mobKey === 'enderdragon') return isDragonUnlocked();
  /* Warden unlocks via random event */
  if (mobKey === 'warden') return isWardenUnlocked();
  /* Wither unlocks via 3 wither skulls */
  if (mobKey === 'wither') return isWitherUnlocked();
  const data = getPlayerData();
  return !!(data.unlockedMobs && data.unlockedMobs[mobKey]);
}

function unlockMob(mobKey) {
  const data = getPlayerData();
  if (!data.unlockedMobs) data.unlockedMobs = {};
  data.unlockedMobs[mobKey] = true;
  savePlayerData(data);
}

/* ================================================================
   ENDER DRAGON UNLOCK LOGIC
   ================================================================ */
const DRAGON_UNLOCK_THRESHOLD = 150;

function isDragonUnlocked() {
  const data = getPlayerData();
  return data.totalScore >= DRAGON_UNLOCK_THRESHOLD;
}

/* ================================================================
   WARDEN UNLOCK LOGIC (random event)
   - Must have killed at least 3 mobs total
   - Each kill after that has escalating chance: starts 1/10, goes up by 1 each kill
   - When triggered: "You are making too much noise, it is the WARDEN"
   ================================================================ */
function isWardenUnlocked() {
  const data = getPlayerData();
  return !!(data.wardenUnlocked);
}

function checkWardenEvent() {
  const data = getPlayerData();
  if (data.wardenUnlocked) return false;
  const totalKills = Object.values(data.kills || {}).reduce((a, b) => a + b, 0);
  if (totalKills < 3) return false;
  /* wardenChance starts at 1 and increments each kill after the 3rd */
  if (!data.wardenChance) data.wardenChance = 0;
  data.wardenChance = Math.min((data.wardenChance || 0) + 1, 10);
  savePlayerData(data);
  /* Roll: chance is wardenChance out of 10 */
  const roll = Math.random() * 10;
  if (roll < data.wardenChance) {
    data.wardenUnlocked = true;
    savePlayerData(data);
    return true;
  }
  return false;
}

/* ================================================================
   HASH-BASED ROUTING
   Routes:
     (empty / no hash)  -> home screen
     #list              -> mob list
     #mob_name          -> QR code page for that mob
     #mob_name/hunt     -> straight to fighting the mob
     #scan              -> QR scanner
     #print             -> printable cards
   ================================================================ */
function navigateTo(hash) {
  window.location.hash = hash;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'game-screen') {
    stopAmbientSound();
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    isGameActive = false;
  }
  if (id === 'home-screen') {
    const data = getPlayerData();
    document.getElementById('total-score').textContent = data.totalScore;
    updateSkullDisplay();
  }
  if (id === 'select-screen') {
    const selData = getPlayerData();
    document.getElementById('select-total-score').textContent = selData.totalScore;
    renderMobGrid();
  }
}

function handleRoute() {
  const hash = window.location.hash.replace(/^#/, '');
  console.log('handleRoute: hash =', hash);

  /* Stop scanner if navigating away from it */
  stopScanner();

  if (!hash || hash === '') {
    /* Home screen */
    showScreen('home-screen');
    return;
  }

  if (hash === 'list') {
    showScreen('select-screen');
    return;
  }

  if (hash === 'scan') {
    showScreen('scanner-screen');
    startScanner();
    return;
  }

  if (hash === 'print') {
    renderPrintCards();
    showScreen('print-screen');
    return;
  }

  /* Check for mob_name/hunt or just mob_name */
  const parts = hash.split('/');
  const mobKey = parts[0];
  const action = parts[1];

  if (mobKey && MOBS[mobKey]) {
    if (action === 'hunt') {
      /* Go straight to fighting */
      /* Block dragon if points threshold not met */
      if (MOBS[mobKey].locked && !isDragonUnlocked()) {
        showScreen('home-screen');
        return;
      }
      /* Block special mobs if not unlocked */
      if (MOBS[mobKey].special) {
        if (mobKey === 'warden' && !isWardenUnlocked()) {
          showScreen('home-screen');
          return;
        }
        if (mobKey === 'wither' && !isWitherUnlocked()) {
          showScreen('home-screen');
          return;
        }
      }
      /* Scanning a QR / visiting hunt URL unlocks that mob */
      unlockMob(mobKey);
      startGame(mobKey);
    } else {
      /* Show QR code page for this mob */
      showScreen('qr-screen');
      generateQR(mobKey);
    }
    return;
  }

  /* Unknown hash - go home */
  showScreen('home-screen');
}

window.addEventListener('hashchange', handleRoute);

/* ================================================================
   PIXEL ART MOB RENDERER
   ================================================================ */
function drawMob(ctx, mobKey, size, frame) {
  const mob = MOBS[mobKey];
  const s = size / 16; /* pixel scale */
  ctx.clearRect(0, 0, size, size);

  /* slight bounce from frame */
  const bounce = Math.sin(frame * 0.1) * s;
  ctx.save();
  ctx.translate(0, bounce);

  const drawFn = MOB_DRAW_FUNCTIONS[mobKey];
  if (drawFn) drawFn(ctx, s, mob, frame);

  ctx.restore();
}

function drawZombie(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 8*s);
  /* Hair */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 1*s, 8*s, 2*s);
  /* Eyes */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 4*s, 2*s, 2*s);
  ctx.fillRect(9*s, 4*s, 2*s, 2*s);
  /* Mouth */
  ctx.fillRect(6*s, 7*s, 4*s, 1*s);
  /* Body */
  ctx.fillStyle = '#4a8';
  ctx.fillRect(5*s, 9*s, 6*s, 4*s);
  /* Arms - animated */
  const armSwing = Math.sin(frame * 0.15) * 1.5 * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 9*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 9*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillStyle = '#336';
  const legSwing = Math.sin(frame * 0.12) * s;
  ctx.fillRect(6*s, 13*s + legSwing, 2*s, 3*s);
  ctx.fillRect(9*s, 13*s - legSwing, 2*s, 3*s);
}

function drawSkeleton(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 7*s);
  /* Eyes - dark hollows */
  ctx.fillStyle = '#222';
  ctx.fillRect(5*s, 3*s, 2*s, 2*s);
  ctx.fillRect(9*s, 3*s, 2*s, 2*s);
  /* Nose */
  ctx.fillRect(7*s, 5*s, 2*s, 1*s);
  /* Mouth */
  ctx.fillStyle = '#555';
  ctx.fillRect(5*s, 6*s, 6*s, 1*s);
  /* Spine */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(7*s, 8*s, 2*s, 5*s);
  /* Ribs */
  ctx.fillRect(5*s, 9*s, 6*s, 1*s);
  ctx.fillRect(5*s, 11*s, 6*s, 1*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.12) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 8*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillRect(6*s, 13*s, 1*s, 3*s);
  ctx.fillRect(9*s, 13*s, 1*s, 3*s);
}

function drawCreeper(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 0*s, 10*s, 8*s);
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(3*s, 0*s, 10*s, 1*s);
  /* Face - iconic creeper face */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 2*s, 2*s, 2*s);
  ctx.fillRect(9*s, 2*s, 2*s, 2*s);
  ctx.fillRect(7*s, 4*s, 2*s, 1*s);
  ctx.fillRect(6*s, 5*s, 4*s, 2*s);
  ctx.fillRect(6*s, 7*s, 1*s, 1*s);
  ctx.fillRect(9*s, 7*s, 1*s, 1*s);
  /* Body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 8*s, 6*s, 4*s);
  /* 4 Legs */
  const sway = Math.sin(frame * 0.1) * 0.5 * s;
  ctx.fillRect(5*s + sway, 12*s, 2*s, 4*s);
  ctx.fillRect(9*s - sway, 12*s, 2*s, 4*s);
}

function drawSpider(ctx, s, mob, frame) {
  /* Body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 5*s, 6*s, 4*s);
  /* Head */
  ctx.fillRect(3*s, 6*s, 3*s, 3*s);
  /* Abdomen */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(10*s, 5*s, 4*s, 5*s);
  /* Eyes - 8 red eyes! */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(3*s, 6*s, 1*s, 1*s);
  ctx.fillRect(5*s, 6*s, 1*s, 1*s);
  ctx.fillRect(3*s, 8*s, 1*s, 1*s);
  ctx.fillRect(5*s, 8*s, 1*s, 1*s);
  /* Legs - 4 on each side, animated */
  ctx.fillStyle = mob.color;
  for (let i = 0; i < 4; i++) {
    const legOff = Math.sin(frame * 0.15 + i * 1.5) * 1.5 * s;
    ctx.fillRect((5 + i * 1.5)*s, 3*s + legOff, 1*s, 2*s);
    ctx.fillRect((5 + i * 1.5)*s, 9*s - legOff, 1*s, 3*s);
  }
}

function drawEnderman(ctx, s, mob, frame) {
  /* Tall body */
  ctx.fillStyle = mob.color;
  /* Head */
  ctx.fillRect(4*s, 0, 8*s, 5*s);
  /* Eyes - purple glow */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 2*s, 2*s, 1*s);
  ctx.fillRect(9*s, 2*s, 2*s, 1*s);
  /* Body - thin */
  ctx.fillStyle = mob.color;
  ctx.fillRect(6*s, 5*s, 4*s, 5*s);
  /* Long arms */
  const armSwing = Math.sin(frame * 0.08) * 1.5 * s;
  ctx.fillRect(4*s, 5*s + armSwing, 2*s, 6*s);
  ctx.fillRect(10*s, 5*s - armSwing, 2*s, 6*s);
  /* Long legs */
  const legSwing = Math.sin(frame * 0.1) * s;
  ctx.fillRect(6*s, 10*s + legSwing, 2*s, 6*s);
  ctx.fillRect(9*s, 10*s - legSwing, 2*s, 6*s);
  /* Particles */
  ctx.fillStyle = mob.eyeColor;
  const px = 2 + Math.sin(frame * 0.2) * 3;
  const py = 2 + Math.cos(frame * 0.17) * 5;
  ctx.globalAlpha = 0.4 + Math.sin(frame * 0.3) * 0.3;
  ctx.fillRect(px*s, py*s, s, s);
  ctx.fillRect((14-px)*s, (py+2)*s, s, s);
  ctx.globalAlpha = 1;
}

function drawEnderdragon(ctx, s, mob, frame) {
  /* Wings - large and sweeping */
  const wingFlap = Math.sin(frame * 0.12) * 2 * s;
  ctx.fillStyle = mob.wingColor || '#2c2c2c';
  /* Left wing */
  ctx.fillRect(0, 3*s + wingFlap, 4*s, 5*s);
  ctx.fillRect(1*s, 2*s + wingFlap, 3*s, 1*s);
  /* Right wing */
  ctx.fillRect(12*s, 3*s - wingFlap, 4*s, 5*s);
  ctx.fillRect(12*s, 2*s - wingFlap, 3*s, 1*s);

  /* Body - long dragon body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 4*s, 6*s, 5*s);

  /* Spine ridge */
  ctx.fillStyle = mob.accentColor || '#7b1fa2';
  ctx.fillRect(7*s, 3*s, 2*s, 1*s);
  ctx.fillRect(6*s, 8*s, 4*s, 1*s);

  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 0, 6*s, 4*s);
  /* Horns */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 0, 1*s, 1*s);
  ctx.fillRect(10*s, 0, 1*s, 1*s);
  /* Snout */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 3*s, 4*s, 1*s);
  /* Eyes - glowing purple */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 1*s, 2*s, 2*s);
  ctx.fillRect(9*s, 1*s, 2*s, 2*s);
  /* Eye glow pulse */
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.2;
  ctx.fillRect(5*s, 1*s, 3*s, 2*s);
  ctx.fillRect(8*s, 1*s, 3*s, 2*s);
  ctx.globalAlpha = 1;

  /* Legs */
  ctx.fillStyle = mob.color;
  const legSwing = Math.sin(frame * 0.1) * s;
  ctx.fillRect(5*s, 9*s + legSwing, 2*s, 3*s);
  ctx.fillRect(9*s, 9*s - legSwing, 2*s, 3*s);
  /* Claws */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 12*s + legSwing, 2*s, 1*s);
  ctx.fillRect(9*s, 12*s - legSwing, 2*s, 1*s);

  /* Tail */
  ctx.fillStyle = mob.color;
  const tailSway = Math.sin(frame * 0.08) * 1.5 * s;
  ctx.fillRect(6*s, 13*s, 4*s, 1*s);
  ctx.fillRect(7*s + tailSway, 14*s, 3*s, 1*s);
  ctx.fillRect(8*s + tailSway * 1.5, 15*s, 2*s, 1*s);

  /* Ender particles */
  ctx.fillStyle = mob.eyeColor;
  for (let i = 0; i < 3; i++) {
    const px = 1 + Math.sin(frame * 0.2 + i * 2) * 6;
    const py = 1 + Math.cos(frame * 0.17 + i * 2.5) * 7;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.3 + i) * 0.3;
    ctx.fillRect(px * s, py * s, s, s);
  }
  ctx.globalAlpha = 1;
}

function drawWitch(ctx, s, mob, frame) {
  /* Hat */
  ctx.fillStyle = '#2c1f17';
  ctx.fillRect(7*s, 0, 2*s, 1*s);
  ctx.fillRect(5*s, 1*s, 6*s, 2*s);
  ctx.fillRect(3*s, 3*s, 10*s, 1*s);
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 4*s, 8*s, 6*s);
  /* Eyes */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 5*s, 2*s, 2*s);
  ctx.fillRect(9*s, 5*s, 2*s, 2*s);
  /* Nose - wart */
  ctx.fillStyle = '#6d4c41';
  ctx.fillRect(7*s, 7*s, 2*s, 2*s);
  /* Body / robe */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 10*s, 8*s, 4*s);
  /* Potion - bobbing */
  const potionBob = Math.sin(frame * 0.15) * s;
  ctx.fillStyle = '#76ff03';
  ctx.fillRect(2*s, 10*s + potionBob, 2*s, 2*s);
  ctx.fillStyle = '#33691e';
  ctx.fillRect(2*s, 9*s + potionBob, 2*s, 1*s);
  /* Legs */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 14*s, 2*s, 2*s);
  ctx.fillRect(9*s, 14*s, 2*s, 2*s);
}

function drawBlaze(ctx, s, mob, frame) {
  /* Floating rods */
  ctx.fillStyle = '#ffcc02';
  const rodAng = frame * 0.08;
  for (let i = 0; i < 6; i++) {
    const a = rodAng + i * Math.PI / 3;
    const rx = 8*s + Math.cos(a) * 5*s;
    const ry = 8*s + Math.sin(a) * 5*s;
    ctx.fillRect(rx - 0.5*s, ry - 1.5*s, s, 3*s);
  }
  /* Head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 3*s, 6*s, 6*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 5*s, 2*s, 2*s);
  ctx.fillRect(9*s, 5*s, 2*s, 2*s);
  /* Mouth */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 8*s, 4*s, 1*s);
  /* Smoke particles */
  ctx.fillStyle = '#ff5722';
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.2) * 0.3;
  ctx.fillRect((6 + Math.sin(frame * 0.15) * 2)*s, (1 + Math.cos(frame * 0.12) * 2)*s, s, s);
  ctx.globalAlpha = 1;
}

function drawBogged(ctx, s, mob, frame) {
  /* Like skeleton but mossy green */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 7*s);
  /* Moss patches */
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(4*s, 1*s, 2*s, 1*s);
  ctx.fillRect(10*s, 2*s, 2*s, 1*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 3*s, 2*s, 2*s);
  ctx.fillRect(9*s, 3*s, 2*s, 2*s);
  /* Nose/mouth */
  ctx.fillStyle = '#555';
  ctx.fillRect(7*s, 5*s, 2*s, 1*s);
  ctx.fillRect(5*s, 6*s, 6*s, 1*s);
  /* Spine */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(7*s, 8*s, 2*s, 5*s);
  ctx.fillRect(5*s, 9*s, 6*s, 1*s);
  ctx.fillRect(5*s, 11*s, 6*s, 1*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.12) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 8*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillRect(6*s, 13*s, 1*s, 3*s);
  ctx.fillRect(9*s, 13*s, 1*s, 3*s);
}

function drawBreeze(ctx, s, mob, frame) {
  /* Swirling wind body */
  ctx.fillStyle = mob.color;
  ctx.globalAlpha = 0.6;
  const wobble = Math.sin(frame * 0.12) * s;
  ctx.fillRect(5*s + wobble, 3*s, 6*s, 8*s);
  ctx.globalAlpha = 0.8;
  ctx.fillRect(6*s, 4*s, 4*s, 6*s);
  ctx.globalAlpha = 1;
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 5*s, 2*s, 2*s);
  ctx.fillRect(9*s, 5*s, 2*s, 2*s);
  /* Wind particles */
  ctx.fillStyle = mob.darkColor;
  ctx.globalAlpha = 0.4;
  for (let i = 0; i < 3; i++) {
    const px = (3 + Math.sin(frame * 0.2 + i * 2) * 5);
    const py = (2 + Math.cos(frame * 0.15 + i * 1.5) * 6);
    ctx.fillRect(px*s, py*s, s, s);
  }
  ctx.globalAlpha = 1;
}

function drawCaveSpider(ctx, s, mob, frame) {
  /* Small spider - compact body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(6*s, 6*s, 4*s, 3*s);
  /* Head */
  ctx.fillRect(4*s, 7*s, 3*s, 2*s);
  /* Abdomen */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(9*s, 6*s, 3*s, 4*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(4*s, 7*s, 1*s, 1*s);
  ctx.fillRect(6*s, 7*s, 1*s, 1*s);
  /* Legs */
  ctx.fillStyle = mob.color;
  for (let i = 0; i < 4; i++) {
    const legOff = Math.sin(frame * 0.15 + i * 1.5) * s;
    ctx.fillRect((6 + i)*s, 4*s + legOff, 1*s, 2*s);
    ctx.fillRect((6 + i)*s, 9*s - legOff, 1*s, 2*s);
  }
}

function drawDrowned(ctx, s, mob, frame) {
  /* Head - aqua zombie */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 8*s);

  ctx.fillRect(11*s, 2*s, 1*s, 3*s);
  /* Body */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 9*s, 6*s, 4*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.15) * 1.5*s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 9*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 9*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillStyle = mob.darkColor;
  const legSwing = Math.sin(frame * 0.12) * s;
  ctx.fillRect(6*s, 13*s + legSwing, 2*s, 3*s);
  ctx.fillRect(9*s, 13*s - legSwing, 2*s, 3*s);
}

function drawElderGuardian(ctx, s, mob, frame) {
  /* Large spiky body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 3*s, 10*s, 10*s);
  /* Spikes */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 1*s, 2*s, 2*s);

  ctx.fillRect(1*s, 6*s, 2*s, 2*s);
  ctx.fillRect(13*s, 6*s, 2*s, 2*s);
  ctx.fillRect(4*s, 13*s, 2*s, 2*s);
  ctx.fillRect(10*s, 13*s, 2*s, 2*s);
  /* Eye */
  ctx.fillStyle = mob.eyeColor;
  const eyePulse = Math.sin(frame * 0.1) * 0.5*s;
  ctx.fillRect(6*s, 6*s + eyePulse, 4*s, 4*s);

  ctx.fillRect(7*s, 7*s + eyePulse, 2*s, 2*s);

  ctx.fillStyle = mob.color;

}

function drawEndermite(ctx, s, mob, frame) {
  /* Tiny segmented body */
  const wiggle = Math.sin(frame * 0.2) * 0.5*s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s + wiggle, 7*s, 3*s, 2*s);
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(8*s, 7*s, 2*s, 2*s);
  ctx.fillRect(3*s + wiggle, 7*s, 2*s, 2*s);

  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(3*s + wiggle, 7*s, 1*s, 1*s);

  ctx.globalAlpha = 0.4;
  ctx.fillRect((4 + Math.sin(frame * 0.3) * 3)*s, (5 + Math.cos(frame * 0.25) * 3)*s, s, s);
  ctx.globalAlpha = 1;
}

function drawEvoker(ctx, s, mob, frame) {
  /* Like a villager with dark robes */
  /* Head */
  ctx.fillStyle = '#c8a882';
  ctx.fillRect(5*s, 2*s, 6*s, 6*s);
  /* Eyebrows */
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(5*s, 2*s, 6*s, 1*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 4*s, 2*s, 1*s);
  ctx.fillRect(9*s, 4*s, 2*s, 1*s);
  /* Nose */
  ctx.fillStyle = '#c8a882';
  ctx.fillRect(7*s, 5*s, 2*s, 2*s);
  /* Robe - dark */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 8*s, 8*s, 5*s);
  /* Arms in casting pose */
  const castAnim = Math.sin(frame * 0.15) * 2*s;
  ctx.fillRect(2*s, 8*s + castAnim, 2*s, 4*s);
  ctx.fillRect(12*s, 8*s - castAnim, 2*s, 4*s);
  /* Magic particles */
  ctx.fillStyle = '#ff5722';
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.2) * 0.3;
  ctx.fillRect((2 + Math.sin(frame * 0.25) * 2)*s, (7 + castAnim/s)*s, s, s);
  ctx.fillRect((13 + Math.cos(frame * 0.25))*s, (7 - castAnim/s)*s, s, s);
  ctx.globalAlpha = 1;
  /* Legs */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 13*s, 2*s, 3*s);
  ctx.fillRect(9*s, 13*s, 2*s, 3*s);
}

function drawGhast(ctx, s, mob, frame) {
  /* Large white body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 1*s, 10*s, 8*s);

  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 3*s, 2*s, 2*s);
  ctx.fillRect(9*s, 3*s, 2*s, 2*s);
  /* Sad mouth */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 6*s, 4*s, 2*s);
  ctx.fillRect(7*s, 5*s, 2*s, 1*s);
  /* Tentacles */
  ctx.fillStyle = mob.darkColor;
  for (let i = 0; i < 3; i++) {
    const tentOff = Math.sin(frame * 0.1 + i) * s;
    ctx.fillRect((4 + i * 3)*s, 9*s + tentOff, 2*s, 4*s);
    ctx.fillRect((5 + i * 3)*s, 12*s + tentOff, 1*s, 2*s);
  }
  /* Tear */
  ctx.fillStyle = '#90caf9';
  const tearY = (6 + (frame * 0.1) % 4)*s;
  ctx.globalAlpha = 0.6;
  ctx.fillRect(5*s, tearY, s, s);
  ctx.globalAlpha = 1;
}

function drawGuardian(ctx, s, mob, frame) {
  /* Diamond-shaped body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 3*s, 6*s, 8*s);
  ctx.fillRect(3*s, 5*s, 10*s, 4*s);
  /* Spines */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 1*s, 1*s, 2*s);
  ctx.fillRect(9*s, 1*s, 1*s, 2*s);
  ctx.fillRect(1*s, 6*s, 2*s, 1*s);
  ctx.fillRect(13*s, 6*s, 2*s, 1*s);
  /* Eye */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 6*s, 4*s, 2*s);
  ctx.fillStyle = '#000';
  ctx.fillRect(7*s, 6*s, 2*s, 2*s);
  /* Tail */
  const tailSway = Math.sin(frame * 0.1) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(7*s + tailSway, 11*s, 2*s, 3*s);
}

function drawHoglin(ctx, s, mob, frame) {
  /* Large body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 5*s, 10*s, 6*s);
  /* Head */
  ctx.fillRect(1*s, 3*s, 5*s, 5*s);

  ctx.fillStyle = '#fff';
  ctx.fillRect(1*s, 7*s, 1*s, 2*s);
  ctx.fillRect(5*s, 7*s, 1*s, 2*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(2*s, 4*s, 1*s, 1*s);
  ctx.fillRect(4*s, 4*s, 1*s, 1*s);
  /* Ears */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(1*s, 2*s, 2*s, 1*s);
  ctx.fillRect(4*s, 2*s, 2*s, 1*s);
  /* Legs */
  const legSwing = Math.sin(frame * 0.12) * s;
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 11*s + legSwing, 2*s, 3*s);
  ctx.fillRect(7*s, 11*s - legSwing, 2*s, 3*s);
  ctx.fillRect(10*s, 11*s + legSwing, 2*s, 3*s);
}

function drawHusk(ctx, s, mob, frame) {
  /* Like zombie but sandy */
  ctx.fillStyle = mob.color;

  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 1*s, 8*s, 2*s);

  const armSwing = Math.sin(frame * 0.15) * 1.5*s;

  ctx.fillRect(3*s, 9*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 9*s - armSwing, 2*s, 4*s);

  ctx.fillStyle = '#6d5030';

function drawMagmaCube(ctx, s, mob, frame) {
  /* Bouncing cube */
  const squish = Math.abs(Math.sin(frame * 0.12)) * 2*s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 3*s + squish, 8*s, 10*s - squish);
  /* Lava cracks */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 5*s + squish, 2*s, 1*s);
  ctx.fillRect(9*s, 5*s + squish, 2*s, 1*s);
  ctx.fillRect(6*s, 8*s + squish/2, 4*s, 1*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 4*s + squish, 1*s, 2*s);
  ctx.fillRect(9*s, 4*s + squish, 1*s, 2*s);
  /* Core glow */
  ctx.fillStyle = '#ffeb3b';
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.2;
  ctx.fillRect(6*s, 6*s + squish/2, 4*s, 4*s);
  ctx.globalAlpha = 1;
}

function drawPhantom(ctx, s, mob, frame) {
  /* Wings spread */
  const flapY = Math.sin(frame * 0.15) * 2*s;
  ctx.fillStyle = mob.color;
  /* Left wing */
  ctx.fillRect(1*s, 5*s + flapY, 5*s, 2*s);
  ctx.fillRect(0, 4*s + flapY, 3*s, 1*s);
  /* Right wing */
  ctx.fillRect(10*s, 5*s - flapY, 5*s, 2*s);
  ctx.fillRect(13*s, 4*s - flapY, 3*s, 1*s);
  /* Body */
  ctx.fillRect(5*s, 4*s, 6*s, 4*s);
  /* Head */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 3*s, 4*s, 2*s);

  ctx.fillStyle = mob.color;
  const tailSway = Math.sin(frame * 0.08) * s;
  ctx.fillRect(7*s + tailSway, 8*s, 2*s, 2*s);
  ctx.fillRect(7*s + tailSway * 1.5, 10*s, 1*s, 2*s);

function drawPiglinBrute(ctx, s, mob, frame) {
  /* Head - piglin */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 7*s);

  ctx.fillRect(5*s, 3*s, 2*s, 2*s);

  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);

  ctx.fillStyle = '#ffd700';
  ctx.fillRect(12*s, 6*s - armSwing, 2*s, 6*s);

  ctx.fillRect(11*s, 6*s - armSwing, 3*s, 2*s);

  ctx.fillRect(9*s, 13*s, 2*s, 3*s);

function drawPillager(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = '#c8a882';
  ctx.fillRect(5*s, 2*s, 6*s, 6*s);
  /* Hood/bandana */

  ctx.fillRect(5*s, 2*s, 6*s, 2*s);

  ctx.fillRect(7*s, 5*s, 2*s, 2*s);

function drawRavager(ctx, s, mob, frame) {
  /* Massive body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(2*s, 3*s, 12*s, 7*s);
  /* Head - large with horns */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(1*s, 1*s, 6*s, 5*s);
  /* Horns */
  ctx.fillStyle = '#9e9e9e';
  ctx.fillRect(0, 0, 2*s, 2*s);
  ctx.fillRect(5*s, 0, 2*s, 2*s);

  ctx.fillRect(2*s, 2*s, 1*s, 1*s);
  ctx.fillRect(5*s, 2*s, 1*s, 1*s);

  ctx.fillStyle = '#555';
  ctx.fillRect(2*s, 4*s, 4*s, 1*s);
  /* Legs */
  const legSwing = Math.sin(frame * 0.1) * s;
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(3*s, 10*s + legSwing, 3*s, 4*s);
  ctx.fillRect(6*s, 10*s - legSwing, 3*s, 4*s);
  ctx.fillRect(9*s, 10*s + legSwing, 3*s, 4*s);
}

function drawShulker(ctx, s, mob, frame) {
  /* Shell (opening/closing) */
  const openAmt = (Math.sin(frame * 0.08) + 1) * 1.5*s;
  ctx.fillStyle = mob.color;
  /* Top shell */
  ctx.fillRect(3*s, 2*s - openAmt, 10*s, 4*s);
  /* Bottom shell */
  ctx.fillRect(3*s, 8*s + openAmt, 10*s, 4*s);
  /* Inner body - visible when open */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 6*s, 8*s, 2*s);
  /* Eyes (inside) */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 6*s, 2*s, 1*s);
  ctx.fillRect(9*s, 6*s, 2*s, 1*s);
  /* Shell texture */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 3*s - openAmt, 2*s, 1*s);
  ctx.fillRect(9*s, 3*s - openAmt, 2*s, 1*s);
  ctx.fillRect(5*s, 10*s + openAmt, 2*s, 1*s);
  ctx.fillRect(9*s, 10*s + openAmt, 2*s, 1*s);
}

function drawSilverfish(ctx, s, mob, frame) {
  /* Tiny segmented worm */
  const wiggle = Math.sin(frame * 0.25) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s + wiggle, 7*s, 2*s, 2*s);
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(5*s, 7*s, 3*s, 2*s);
  ctx.fillStyle = mob.color;
  ctx.fillRect(8*s - wiggle * 0.5, 7*s, 2*s, 2*s);
  ctx.fillRect(10*s - wiggle, 7*s, 2*s, 1*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(3*s + wiggle, 7*s, 1*s, 1*s);
  /* Antennae */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(2*s + wiggle, 6*s, 1*s, 1*s);
  ctx.fillRect(4*s + wiggle, 6*s, 1*s, 1*s);
}

function drawSlime(ctx, s, mob, frame) {
  /* Bouncing cube */
  const squish = Math.abs(Math.sin(frame * 0.12)) * 2*s;
  ctx.fillStyle = mob.color;
  ctx.globalAlpha = 0.7;
  ctx.fillRect(3*s, 3*s + squish, 10*s, 10*s - squish);
  ctx.globalAlpha = 1;
  /* Inner core */
  ctx.fillStyle = mob.darkColor;
  ctx.globalAlpha = 0.8;
  ctx.fillRect(5*s, 5*s + squish, 6*s, 6*s - squish/2);
  ctx.globalAlpha = 1;
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 5*s + squish, 2*s, 2*s);
  ctx.fillRect(9*s, 5*s + squish, 2*s, 2*s);
  /* Mouth */
  ctx.fillRect(6*s, 9*s + squish/2, 4*s, 1*s);
}

function drawStray(ctx, s, mob, frame) {
  /* Icy skeleton with tattered cloth */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 7*s);
  /* Ice crystals */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(4*s, 1*s, 1*s, 1*s);
  ctx.fillRect(11*s, 1*s, 1*s, 1*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 3*s, 2*s, 2*s);
  ctx.fillRect(9*s, 3*s, 2*s, 2*s);
  /* Mouth */
  ctx.fillStyle = '#555';
  ctx.fillRect(5*s, 6*s, 6*s, 1*s);
  /* Tattered cloth */
  ctx.fillStyle = '#aaa';
  ctx.fillRect(4*s, 8*s, 8*s, 2*s);
  /* Spine */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(7*s, 10*s, 2*s, 3*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.12) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 8*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillRect(6*s, 13*s, 1*s, 3*s);
  ctx.fillRect(9*s, 13*s, 1*s, 3*s);
}

function drawVex(ctx, s, mob, frame) {
  /* Tiny flying ghost with sword */
  const floatY = Math.sin(frame * 0.15) * 2*s;
  ctx.fillStyle = mob.color;
  ctx.globalAlpha = 0.8;
  /* Body */
  ctx.fillRect(6*s, 4*s + floatY, 4*s, 5*s);
  ctx.globalAlpha = 1;
  /* Head */
  ctx.fillRect(5*s, 2*s + floatY, 6*s, 3*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 3*s + floatY, 1*s, 1*s);
  ctx.fillRect(9*s, 3*s + floatY, 1*s, 1*s);
  /* Wings */
  ctx.fillStyle = mob.darkColor;
  ctx.globalAlpha = 0.5;
  const wingFlap = Math.sin(frame * 0.2) * s;
  ctx.fillRect(3*s, 4*s + floatY + wingFlap, 3*s, 2*s);
  ctx.fillRect(10*s, 4*s + floatY - wingFlap, 3*s, 2*s);
  ctx.globalAlpha = 1;
  /* Sword */
  ctx.fillStyle = '#9e9e9e';
  ctx.fillRect(11*s, 5*s + floatY, 1*s, 4*s);
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(10*s, 8*s + floatY, 3*s, 1*s);
}

function drawVindicator(ctx, s, mob, frame) {
  /* Head */
  ctx.fillStyle = '#c8a882';
  ctx.fillRect(5*s, 2*s, 6*s, 6*s);
  /* Eyebrows - angry */
  ctx.fillStyle = mob.color;
  ctx.fillRect(5*s, 2*s, 6*s, 2*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 4*s, 2*s, 1*s);
  ctx.fillRect(9*s, 4*s, 2*s, 1*s);
  /* Nose */
  ctx.fillStyle = '#c8a882';
  ctx.fillRect(7*s, 5*s, 2*s, 2*s);
  /* Body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 8*s, 8*s, 5*s);
  /* Belt */
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(4*s, 11*s, 8*s, 1*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.12) * 1.5*s;
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);

  ctx.fillRect(11*s, 6*s - Math.abs(armSwing), 2*s, 5*s);

  ctx.fillStyle = '#9e9e9e';
  ctx.fillRect(12*s, 5*s - Math.abs(armSwing), 2*s, 3*s);

function drawWitherSkeleton(ctx, s, mob, frame) {
  /* Dark skeleton */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 7*s);
  /* Eyes */
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(5*s, 3*s, 2*s, 2*s);
  ctx.fillRect(9*s, 3*s, 2*s, 2*s);
  /* Mouth */
  ctx.fillStyle = '#444';
  ctx.fillRect(5*s, 6*s, 6*s, 1*s);
  /* Spine */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(7*s, 8*s, 2*s, 5*s);
  ctx.fillRect(5*s, 9*s, 6*s, 1*s);
  ctx.fillRect(5*s, 11*s, 6*s, 1*s);
  /* Arms + sword */
  const armSwing = Math.sin(frame * 0.12) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 8*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 8*s - armSwing, 2*s, 4*s);
  /* Sword */
  ctx.fillStyle = '#555';
  ctx.fillRect(12*s, 6*s - armSwing, 1*s, 5*s);
  /* Legs */
  ctx.fillRect(6*s, 13*s, 1*s, 3*s);

}

function drawZoglin(ctx, s, mob, frame) {
  /* Zombified hoglin - like hoglin but decayed */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 5*s, 10*s, 6*s);
  /* Head */
  ctx.fillRect(1*s, 3*s, 5*s, 5*s);
  /* Exposed bone */
  ctx.fillStyle = '#bbb';
  ctx.fillRect(3*s, 6*s, 2*s, 2*s);

  ctx.fillStyle = '#ddd';
  ctx.fillRect(1*s, 7*s, 1*s, 2*s);
  ctx.fillRect(5*s, 7*s, 1*s, 2*s);

  ctx.fillStyle = mob.eyeColor;

  ctx.fillRect(4*s, 4*s, 1*s, 1*s);

  ctx.fillStyle = mob.darkColor;

function drawZombieVillager(ctx, s, mob, frame) {
  /* Green villager head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 1*s, 8*s, 8*s);
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 1*s, 8*s, 2*s);
  /* Eyes */
  ctx.fillStyle = '#000';
  ctx.fillRect(5*s, 4*s, 2*s, 2*s);
  ctx.fillRect(9*s, 4*s, 2*s, 2*s);
  /* Big nose (villager trait) */
  ctx.fillStyle = mob.color;
  ctx.fillRect(6*s, 6*s, 4*s, 2*s);
  /* Body */
  ctx.fillStyle = '#4a3628';
  ctx.fillRect(5*s, 9*s, 6*s, 4*s);
  /* Arms */
  const armSwing = Math.sin(frame * 0.15) * 1.5*s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 9*s + armSwing, 2*s, 4*s);
  ctx.fillRect(11*s, 9*s - armSwing, 2*s, 4*s);
  /* Legs */
  ctx.fillStyle = '#336';
  const legSwing = Math.sin(frame * 0.12) * s;
  ctx.fillRect(6*s, 13*s + legSwing, 2*s, 3*s);
  ctx.fillRect(9*s, 13*s - legSwing, 2*s, 3*s);
}

function drawWarden(ctx, s, mob, frame) {
  /* Massive dark teal body */
  ctx.fillStyle = mob.color;
  ctx.fillRect(4*s, 2*s, 8*s, 5*s);
  /* Horns/antlers */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(4*s, 0, 2*s, 2*s);
  ctx.fillRect(10*s, 0, 2*s, 2*s);
  /* Eyes - glowing blue (no actual eyes, sonic sensors) */
  ctx.fillStyle = mob.eyeColor;
  const pulse = Math.sin(frame * 0.15);
  ctx.globalAlpha = 0.5 + pulse * 0.3;
  ctx.fillRect(5*s, 4*s, 2*s, 1*s);
  ctx.fillRect(9*s, 4*s, 2*s, 1*s);
  ctx.globalAlpha = 1;
  /* Chest - sculk pattern */
  ctx.fillStyle = mob.eyeColor;
  ctx.globalAlpha = 0.3 + pulse * 0.2;
  ctx.fillRect(6*s, 5*s, 4*s, 1*s);
  ctx.globalAlpha = 1;
  /* Body - wide */
  ctx.fillStyle = mob.color;
  ctx.fillRect(3*s, 7*s, 10*s, 5*s);
  /* Arms - massive */
  const armSwing = Math.sin(frame * 0.08) * s;
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(1*s, 7*s + armSwing, 2*s, 6*s);
  ctx.fillRect(13*s, 7*s - armSwing, 2*s, 6*s);
  /* Legs */
  const legSwing = Math.sin(frame * 0.1) * s;
  ctx.fillRect(4*s, 12*s + legSwing, 3*s, 4*s);
  ctx.fillRect(9*s, 12*s - legSwing, 3*s, 4*s);
  /* Sonic particles */
  ctx.fillStyle = mob.eyeColor;
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 2; i++) {
    const px = 2 + Math.sin(frame * 0.15 + i * 3) * 5;
    const py = 1 + Math.cos(frame * 0.12 + i * 2) * 4;
    ctx.fillRect(px*s, py*s, s, s);
  }
  ctx.globalAlpha = 1;
}

function drawWither(ctx, s, mob, frame) {
  /* Three heads */
  ctx.fillStyle = mob.color;
  /* Center head */
  ctx.fillRect(5*s, 1*s, 6*s, 5*s);
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(6*s, 3*s, 2*s, 1*s);
  ctx.fillRect(8*s, 3*s, 2*s, 1*s);
  /* Left head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(0, 2*s, 4*s, 4*s);
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(1*s, 3*s, 1*s, 1*s);
  ctx.fillRect(2*s, 3*s, 1*s, 1*s);
  /* Right head */
  ctx.fillStyle = mob.color;
  ctx.fillRect(12*s, 2*s, 4*s, 4*s);
  ctx.fillStyle = mob.eyeColor;
  ctx.fillRect(13*s, 3*s, 1*s, 1*s);
  ctx.fillRect(14*s, 3*s, 1*s, 1*s);
  /* Spine / ribs */
  ctx.fillStyle = mob.darkColor;
  ctx.fillRect(6*s, 6*s, 4*s, 3*s);
  ctx.fillRect(4*s, 6*s, 8*s, 1*s);
  ctx.fillRect(4*s, 8*s, 8*s, 1*s);
  /* Tail */
  const tailSway = Math.sin(frame * 0.1) * s;
  ctx.fillStyle = mob.color;
  ctx.fillRect(7*s + tailSway, 9*s, 2*s, 2*s);
  ctx.fillRect(7*s + tailSway * 1.5, 11*s, 2*s, 2*s);
  ctx.fillRect(7*s + tailSway * 2, 13*s, 1*s, 2*s);
  /* Wither aura */
  ctx.fillStyle = '#555';
  ctx.globalAlpha = 0.2 + Math.sin(frame * 0.2) * 0.15;
  for (let i = 0; i < 3; i++) {
    const px = 3 + Math.sin(frame * 0.15 + i * 2) * 5;
    const py = 0 + Math.cos(frame * 0.12 + i * 2.5) * 7;
    ctx.fillRect(px*s, py*s, s, s);
  }
  ctx.globalAlpha = 1;
}
